<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디·비밀번호 찾기 | 한국숲해설가협회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/pages/auth.css">
</head>

<body class="auth-page">
    <div id="hdr"></div>

    <div class="auth-bg auth-bg--top">
        <div class="auth-card" style="max-width:460px;padding:0;overflow:hidden">

            <!-- 탭 -->
            <div class="find-tabs">
                <button class="find-tab-btn active" id="tabId" onclick="FindCtrl.switchTab('id', this)">
                    아이디 찾기
                </button>
                <button class="find-tab-btn" id="tabPw" onclick="FindCtrl.switchTab('pw', this)">
                    비밀번호 찾기
                </button>
            </div>

            <div class="find-body">

                <!-- ══ 아이디 찾기 ══ -->
                <div class="find-panel active" id="panelId">

                    <p style="font-size:14px;color:var(--gray-mid);margin-bottom:24px;line-height:1.7">
                        가입 시 등록한 <strong>이름과 휴대폰 번호</strong>로
                        아이디(이메일)를 찾을 수 있습니다.
                    </p>

                    <!-- 결과 -->
                    <div class="find-result" id="idResult">
                        <div class="find-result-label">찾은 아이디</div>
                        <div class="find-result-value" id="idResultValue"></div>
                        <div class="find-result-sub" id="idResultSub"></div>
                    </div>

                    <div id="idForm">
                        <div style="margin-bottom:16px">
                            <label class="auth-label">이름</label>
                            <input type="text" class="auth-input" style="padding:0 14px" id="findIdName" placeholder="홍길동">
                        </div>
                        <div style="margin-bottom:16px">
                            <label class="auth-label">휴대폰 번호</label>
                            <div class="form-row-btn">
                                <input type="tel" class="auth-input" style="padding:0 14px" id="findIdPhone" placeholder="010-0000-0000">
                                <button class="btn btn-outline btn-sm" style="height:46px;white-space:nowrap"
                                    onclick="FindCtrl.sendVerifyCode('id')">인증번호 발송</button>
                            </div>
                        </div>
                        <div style="margin-bottom:24px" id="idCodeWrap">
                            <label class="auth-label">인증번호</label>
                            <div class="form-row-btn">
                                <input type="text" class="auth-input" style="padding:0 14px" id="findIdCode"
                                    placeholder="인증번호 6자리 입력" maxlength="6">
                                <span id="idTimer" style="font-size:13px;font-weight:700;color:var(--danger);min-width:44px;text-align:center;line-height:46px">3:00</span>
                            </div>
                        </div>

                        <button class="auth-btn auth-btn-primary" onclick="FindCtrl.findId()">
                            🔍 아이디 찾기
                        </button>
                    </div>

                    <div id="idDoneActions" style="display:none;margin-top:16px;flex-direction:column;gap:8px">
                        <a href="login.html" class="auth-btn auth-btn-primary" style="text-decoration:none">🌲 로그인 하기</a>
                        <button class="btn btn-outline"
                            onclick="FindCtrl.switchTab('pw', document.getElementById('tabPw'))">
                            비밀번호도 찾기 →
                        </button>
                    </div>
                </div>

                <!-- ══ 비밀번호 찾기 ══ -->
                <div class="find-panel" id="panelPw">

                    <p style="font-size:14px;color:var(--gray-mid);margin-bottom:24px;line-height:1.7">
                        가입 시 등록한 <strong>이메일과 휴대폰 번호</strong>로
                        본인을 확인한 후 비밀번호를 재설정합니다.
                    </p>

                    <div id="pwVerifyForm">
                        <div style="margin-bottom:16px">
                            <label class="auth-label">이메일 (아이디)</label>
                            <input type="email" class="auth-input" style="padding:0 14px" id="findPwEmail" placeholder="example@email.com">
                        </div>
                        <div style="margin-bottom:16px">
                            <label class="auth-label">휴대폰 번호</label>
                            <div class="form-row-btn">
                                <input type="tel" class="auth-input" style="padding:0 14px" id="findPwPhone" placeholder="010-0000-0000">
                                <button class="btn btn-outline btn-sm" style="height:46px;white-space:nowrap"
                                    onclick="FindCtrl.sendVerifyCode('pw')">인증번호 발송</button>
                            </div>
                        </div>
                        <div style="margin-bottom:24px" id="pwCodeWrap">
                            <label class="auth-label">인증번호</label>
                            <div class="form-row-btn">
                                <input type="text" class="auth-input" style="padding:0 14px" id="findPwCode"
                                    placeholder="인증번호 6자리 입력" maxlength="6">
                                <span id="pwTimer" style="font-size:13px;font-weight:700;color:var(--danger);min-width:44px;text-align:center;line-height:46px"></span>
                            </div>
                        </div>
                        <button class="auth-btn auth-btn-primary" onclick="FindCtrl.verifyForPw()">본인 확인</button>
                    </div>

                    <!-- 비밀번호 재설정 폼 -->
                    <div class="reset-form" id="pwResetForm">
                        <div class="alert alert-success" style="margin-bottom:20px">
                            <div style="font-size:13px">본인 확인이 완료되었습니다. 새 비밀번호를 설정해 주세요.</div>
                        </div>

                        <div style="margin-bottom:16px">
                            <label class="auth-label">새 비밀번호</label>
                            <div style="position:relative">
                                <input type="password" class="auth-input" id="newPw"
                                    placeholder="8자 이상, 영문·숫자·특수문자 조합" style="padding:0 44px 0 14px">
                                <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--gray-mid);cursor:pointer"
                                    onclick="FindCtrl.togglePw('newPw',this)">👁</span>
                            </div>
                            <div style="margin-top:6px;font-size:12px;color:var(--gray-mid)">
                                8자 이상, 영문·숫자·특수문자를 포함해 주세요.
                            </div>
                        </div>

                        <div style="margin-bottom:24px">
                            <label class="auth-label">새 비밀번호 확인</label>
                            <input type="password" class="auth-input" style="padding:0 14px" id="newPwConfirm"
                                placeholder="비밀번호를 다시 입력하세요">
                        </div>

                        <button class="auth-btn auth-btn-primary" onclick="FindCtrl.resetPassword()">
                            비밀번호 재설정
                        </button>
                    </div>

                    <!-- 재설정 완료 -->
                    <div id="pwDone" style="display:none;text-align:center;padding:16px 0">
                        <div style="font-size:40px;margin-bottom:12px">🎉</div>
                        <div style="font-size:18px;font-weight:800;color:var(--green-dark);margin-bottom:8px">비밀번호 재설정 완료</div>
                        <div style="font-size:14px;color:var(--gray-mid);margin-bottom:20px;line-height:1.7">새 비밀번호로 로그인해 주세요.</div>
                        <a href="login.html" class="auth-btn auth-btn-primary" style="text-decoration:none">로그인 하기</a>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--gray-mid)">
            <a href="login.html" style="color:var(--green-dark);font-weight:700;text-decoration:none">← 로그인으로 돌아가기</a>
            <span style="margin:0 8px;color:var(--gray-light)">|</span>
            <a href="register.html" style="color:var(--green-dark);font-weight:700;text-decoration:none">회원가입</a>
        </div>
    </div>

    <div id="ftr"></div>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/components/header.js"></script>
    <script>
        document.getElementById('hdr').innerHTML = Header.render('', '../');
        document.getElementById('ftr').innerHTML = Footer.render('../');

        const FindCtrl = {
            _idTimer: null, _pwTimer: null,
            _idSent: false, _pwSent: false, _pwVerified: false,

            switchTab(tab, btn) {
                ['Id', 'Pw'].forEach(t => {
                    const panel  = document.getElementById(`panel${t}`);
                    const tabBtn = document.getElementById(`tab${t}`);
                    if (panel)  panel.classList.toggle('active', t.toLowerCase() === tab);
                    if (tabBtn) tabBtn.classList.toggle('active', t.toLowerCase() === tab);
                });
            },

            sendVerifyCode(type) {
                const phoneId = type === 'id' ? 'findIdPhone' : 'findPwPhone';
                const phone   = document.getElementById(phoneId)?.value.trim() || '';
                if (!phone || phone.length < 9) { App.toast('휴대폰 번호를 올바르게 입력해 주세요.', 'warning'); return; }
                const codeWrap = document.getElementById(type === 'id' ? 'idCodeWrap' : 'pwCodeWrap');
                if (codeWrap) codeWrap.style.display = 'block';
                App.toast(`인증번호를 ${phone}으로 발송했습니다. (테스트: 123456)`);
                this._startTimer(type);
                if (type === 'id') this._idSent = true;
                else               this._pwSent = true;
            },

            _startTimer(type) {
                const timerId = type === 'id' ? '_idTimer' : '_pwTimer';
                const spanId  = type === 'id' ? 'idTimer'  : 'pwTimer';
                if (this[timerId]) clearInterval(this[timerId]);
                let remain = 180;
                const update = () => {
                    const m  = String(Math.floor(remain / 60)).padStart(1, '0');
                    const s  = String(remain % 60).padStart(2, '0');
                    const el = document.getElementById(spanId);
                    if (el) el.textContent = `${m}:${s}`;
                    if (remain <= 0) { clearInterval(this[timerId]); if (el) el.textContent = '만료'; }
                    remain--;
                };
                update();
                this[timerId] = setInterval(update, 1000);
            },

            findId() {
                const name  = document.getElementById('findIdName')?.value.trim() || '';
                const phone = document.getElementById('findIdPhone')?.value.trim() || '';
                const code  = document.getElementById('findIdCode')?.value.trim() || '';
                if (!name)             { App.toast('이름을 입력해 주세요.', 'warning'); return; }
                if (!phone)            { App.toast('휴대폰 번호를 입력해 주세요.', 'warning'); return; }
                if (!this._idSent)     { App.toast('인증번호를 먼저 발송해 주세요.', 'warning'); return; }
                if (code !== '123456') { App.toast('인증번호가 일치하지 않습니다.', 'warning'); return; }

                const resultEl  = document.getElementById('idResult');
                const valueEl   = document.getElementById('idResultValue');
                const subEl     = document.getElementById('idResultSub');
                const formEl    = document.getElementById('idForm');
                const actionsEl = document.getElementById('idDoneActions');
                if (resultEl)  resultEl.classList.add('show');
                if (valueEl)   valueEl.textContent = 'test@forest.or.kr';
                if (subEl)     subEl.textContent   = '가입일: 2025-03-15 · 정회원';
                if (formEl)    formEl.style.display = 'none';
                if (actionsEl) actionsEl.style.display = 'flex';
                if (this._idTimer) clearInterval(this._idTimer);
            },

            verifyForPw() {
                const email = document.getElementById('findPwEmail')?.value.trim() || '';
                const phone = document.getElementById('findPwPhone')?.value.trim() || '';
                const code  = document.getElementById('findPwCode')?.value.trim() || '';
                const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
                if (!emailValid)       { App.toast('이메일을 올바르게 입력해 주세요.', 'warning'); return; }
                if (!phone)            { App.toast('휴대폰 번호를 입력해 주세요.', 'warning'); return; }
                if (!this._pwSent)     { App.toast('인증번호를 먼저 발송해 주세요.', 'warning'); return; }
                if (code !== '123456') { App.toast('인증번호가 일치하지 않습니다.', 'warning'); return; }
                this._pwVerified = true;
                if (this._pwTimer) clearInterval(this._pwTimer);
                const verifyEl = document.getElementById('pwVerifyForm');
                const resetEl  = document.getElementById('pwResetForm');
                if (verifyEl) verifyEl.style.display = 'none';
                if (resetEl)  resetEl.classList.add('show');
            },

            resetPassword() {
                if (!this._pwVerified) { App.toast('본인 확인을 먼저 진행해 주세요.', 'warning'); return; }
                const pw     = document.getElementById('newPw')?.value || '';
                const pwConf = document.getElementById('newPwConfirm')?.value || '';
                const pwValid = pw.length >= 8 && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
                if (!pwValid)      { App.toast('비밀번호는 8자 이상 영문·숫자·특수문자 조합이어야 합니다.', 'warning'); return; }
                if (pw !== pwConf) { App.toast('비밀번호가 일치하지 않습니다.', 'warning'); return; }
                const resetEl = document.getElementById('pwResetForm');
                const doneEl  = document.getElementById('pwDone');
                if (resetEl) resetEl.classList.remove('show');
                if (doneEl)  doneEl.style.display = 'block';
                App.toast('비밀번호가 재설정되었습니다!');
            },

            togglePw(inputId, iconEl) {
                const input = document.getElementById(inputId);
                if (!input) return;
                if (input.type === 'password') { input.type = 'text';     iconEl.textContent = '🙈'; }
                else                           { input.type = 'password'; iconEl.textContent = '👁'; }
            },
        };
    </script>
</body>

</html>
