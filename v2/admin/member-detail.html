<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
</head>
<body class="admin-body">
  <div id="hdr"></div>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span>🛠 관리자</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">회원 상세</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
          <button class="btn btn-danger btn-sm" id="deactivateBtn" onclick="MemberDetail.toggleStatus()">비활성 처리</button>
          <button class="btn btn-primary btn-sm" onclick="MemberDetail.save()">저장</button>
        </div>
      </div>

      <div id="detailWrap">
        <div style="text-align:center;padding:60px;color:var(--gray-mid)">회원 정보를 불러오는 중입니다...</div>
      </div>
    </main>
  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('관리자', '../');
    AdminSidebar.mount('members');
    document.getElementById('ftr').innerHTML = Footer.render('../');

    /* ── 샘플 상수 */
    const NAMES    = ['김숲해','이정회','박초록','최나무','정바람','한생태','윤들판','임해설','조산림','강자연'];
    const CHANNELS = ['인터넷 검색','지인 추천','SNS (블로그·인스타·유튜브)','협회 교육 이수 후','기타'];
    const GRADES   = [
      { key:'fullMember', label:'정회원'   },
      { key:'member',     label:'일반회원' },
      { key:'member',     label:'일반회원' },
      { key:'fullMember', label:'정회원'   },
      { key:'member',     label:'일반회원' },
    ];
    const JOBS = ['직장인','자영업자','공무원·교원','전문직','학생','주부','은퇴·퇴직','기타'];
    const ADDRS = [
      { zip:'03000', addr1:'서울특별시 종로구 세종대로 110' },
      { zip:'06141', addr1:'서울특별시 강남구 테헤란로 512' },
      { zip:'14556', addr1:'경기도 부천시 원미구 부흥로 1' },
      { zip:'48058', addr1:'부산광역시 해운대구 해운대해변로 264' },
      { zip:'61466', addr1:'광주광역시 동구 금남로 1가' },
    ];
    const SAMPLE_COURSES = [
      '55기 숲해설가 전문가과정',
      '시민아카데미 봄 숲 이야기',
      '역량강화 교육 — 심화과정',
      '54기 숲해설가 전문가과정',
    ];
    const COURSE_STATUSES = ['신청완료','수료','취소'];

    /* ── 회원 샘플 데이터 (실제 구현 시 API 교체) */
    const ALL_MEMBERS = Array.from({ length: 50 }, (_, i) => {
      const g = GRADES[i % 5];
      const hasMarketing = i % 3 === 0;
      const mDay  = String((i % 20) + 1).padStart(2, '0');
      const mHour = String((i % 12) + 8).padStart(2, '0');
      const mMin  = String((i * 7) % 60).padStart(2, '0');
      const marketingAt = hasMarketing
        ? `2026-0${(i % 9) + 1}-${mDay} ${mHour}:${mMin}`
        : null;

      /* 강좌 신청 내역 샘플 (0~3건) */
      const appCount = i % 4;
      const apps = Array.from({ length: appCount }, (_, j) => ({
        course:    SAMPLE_COURSES[(i + j) % SAMPLE_COURSES.length],
        applyDate: `2026-0${((i + j) % 9) + 1}-${String(((i * 3 + j * 7 + 5) % 20) + 1).padStart(2, '0')}`,
        status:    COURSE_STATUSES[(i + j) % 3],
      }));

      return {
        id:         50 - i,
        name:       NAMES[i % 10],
        userId:     `user${50 - i}@example.com`,
        email:      `user${50 - i}@example.com`,
        emailNews:  i % 4 !== 0,
        phone:      `010-${String(1000 + i).padStart(4, '0')}-${String(5000 + i).padStart(4, '0')}`,
        smsAlarm:   i % 3 !== 0,
        birthY:     String(1970 + (i % 30)),
        birthM:     String((i % 12) + 1).padStart(2, '0'),
        birthD:     String((i % 28) + 1).padStart(2, '0'),
        lunarBirth: i % 5 === 0,
        gender:     i % 2 === 0 ? 'm' : 'f',
        zip:        ADDRS[i % 5].zip,
        addr1:      ADDRS[i % 5].addr1,
        addr2:      `${(i + 1) * 100}호`,
        overseas:   i % 10 === 0,
        job:        JOBS[i % 8],
        channel:    CHANNELS[i % 5],
        grade:      g.key,
        gradeLabel: g.label,
        joinDate:   `2026-0${(i % 9) + 1}-${String((i % 20) + 1).padStart(2, '0')}`,
        status:     i % 7 === 0 ? 'inactive' : 'active',
        marketing:   hasMarketing,
        marketingAt: marketingAt,
        memo:       i % 4 === 0 ? '정회원 전환 요청 확인 완료' : '',
        apps,
      };
    });

    const MemberDetail = {
      _member: null,

      init() {
        const id = Number(App.getParam('id'));
        const m  = ALL_MEMBERS.find(x => x.id === id);

        if (!m) {
          document.getElementById('detailWrap').innerHTML =
            `<div style="text-align:center;padding:60px;color:var(--gray-mid)">해당 회원을 찾을 수 없습니다.</div>`;
          return;
        }

        this._member = m;
        document.getElementById('pageTitle').textContent = `회원 상세 — ${m.name}`;
        document.getElementById('deactivateBtn').textContent =
          m.status === 'active' ? '비활성 처리' : '정상 처리';

        /* 마케팅 동의 일시 힌트 */
        const marketingHint = m.marketingAt
          ? `<span style="font-size:12px;color:var(--green-dark);margin-left:6px">동의일시: ${m.marketingAt}</span>`
          : `<span style="font-size:12px;color:var(--gray-mid);margin-left:6px">미동의</span>`;

        /* 생년월일 드롭다운 옵션 */
        const yearOptions = Array.from({ length: 86 }, (_, k) => 2015 - k)
          .map(y => `<option value="${y}"${y === Number(m.birthY) ? ' selected' : ''}>${y}년</option>`).join('');
        const monthOptions = Array.from({ length: 12 }, (_, k) => k + 1)
          .map(mo => `<option value="${mo}"${mo === Number(m.birthM) ? ' selected' : ''}>${mo}월</option>`).join('');
        const dayOptions = Array.from({ length: 31 }, (_, k) => k + 1)
          .map(d => `<option value="${d}"${d === Number(m.birthD) ? ' selected' : ''}>${d}일</option>`).join('');

        /* 강좌 신청 내역 테이블 */
        const appsHtml = m.apps.length
          ? `<div class="table-wrap" style="margin:0">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th style="width:50px" class="center">NO</th>
                    <th>강좌명</th>
                    <th style="width:110px" class="center">신청일</th>
                    <th style="width:90px" class="center">상태</th>
                  </tr>
                </thead>
                <tbody>
                  ${m.apps.map((a, idx) => {
                    const badgeColor = a.status === '수료' ? 'badge-green' : a.status === '취소' ? 'badge-red' : 'badge-blue';
                    return `<tr>
                      <td class="center" style="color:var(--gray-mid)">${idx + 1}</td>
                      <td style="font-weight:500">${a.course}</td>
                      <td class="center" style="font-size:13px">${a.applyDate}</td>
                      <td class="center">
                        <span class="badge ${badgeColor}" style="font-size:11px">${a.status}</span>
                      </td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>`
          : `<p style="padding:20px;text-align:center;color:var(--gray-mid);font-size:13px">신청 내역이 없습니다.</p>`;

        document.getElementById('detailWrap').innerHTML = `
          <div style="display:flex;flex-direction:column;gap:20px">

            <!-- ① 기본 정보 -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">기본 정보</span>
                <span style="font-size:12px;color:var(--gray-mid)">회원 가입 시 입력 항목</span>
              </div>
              <div style="padding:20px;display:flex;flex-direction:column;gap:18px">

                <!-- 이름 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">이름 <span class="req">*</span></label>
                  <input type="text" class="form-control" id="fName" value="${m.name}" style="max-width:200px">
                </div>

                <!-- 생년월일 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">생년월일</label>
                  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <select class="form-control" id="fBirthY" style="width:96px">${yearOptions}</select>
                    <select class="form-control" id="fBirthM" style="width:78px">${monthOptions}</select>
                    <select class="form-control" id="fBirthD" style="width:78px">${dayOptions}</select>
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;margin-left:8px">
                      <input type="checkbox" id="fLunarBirth"${m.lunarBirth ? ' checked' : ''}> 음력
                    </label>
                  </div>
                </div>

                <!-- 성별 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">성별</label>
                  <div style="display:flex;gap:20px;margin-top:6px">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
                      <input type="radio" name="fGenderR" value="m"${m.gender === 'm' ? ' checked' : ''}> 남성
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
                      <input type="radio" name="fGenderR" value="f"${m.gender === 'f' ? ' checked' : ''}> 여성
                    </label>
                  </div>
                </div>

                <!-- 아이디 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">아이디</label>
                  <input type="text" class="form-control" value="${m.userId}" disabled
                    style="background:var(--gray-light);color:var(--gray-mid);max-width:300px">
                  <div style="font-size:12px;color:var(--gray-mid);margin-top:3px">로그인에 사용되는 아이디 (변경 불가)</div>
                </div>

                <!-- 비밀번호 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">비밀번호</label>
                  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                    <input type="text" class="form-control" value="●●●●●●●●" disabled
                      style="background:var(--gray-light);color:var(--gray-mid);max-width:200px;letter-spacing:2px">
                    <button class="btn btn-outline btn-sm" onclick="MemberDetail.resetPw()" style="white-space:nowrap">
                      초기화
                    </button>
                    <span style="font-size:12px;color:var(--gray-mid)">초기화 시 임시 비밀번호가 이메일로 발송됩니다</span>
                  </div>
                </div>

                <!-- 이메일 + 수신동의 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">이메일</label>
                  <input type="email" class="form-control" id="fEmail" value="${m.email}" style="max-width:320px">
                  <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin-top:8px">
                    <input type="checkbox" id="fEmailNews"${m.emailNews ? ' checked' : ''}> 뉴스레터 / 공지 수신 동의
                  </label>
                </div>

                <!-- 휴대폰 + 알림문자 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">휴대폰 번호</label>
                  <input type="tel" class="form-control" id="fPhone" value="${m.phone}" style="max-width:240px">
                  <div style="font-size:12px;color:var(--gray-mid);margin-top:3px">본인인증으로 확인된 번호</div>
                  <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin-top:8px">
                    <input type="checkbox" id="fSmsAlarm"${m.smsAlarm ? ' checked' : ''}> 알림문자 수신 동의
                  </label>
                </div>

                <!-- 주소 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">주소</label>
                  <div style="display:flex;gap:8px;align-items:center;max-width:480px">
                    <input type="text" class="form-control" id="fZip" value="${m.zip}"
                      placeholder="우편번호" style="width:110px;flex-shrink:0">
                    <button type="button" class="btn btn-outline btn-sm" id="addrSearchBtn"
                      onclick="MemberDetail.searchAddr()" style="white-space:nowrap;flex-shrink:0">
                      우편번호 찾기
                    </button>
                  </div>
                  <input type="text" class="form-control" id="fAddr1" value="${m.addr1}"
                    placeholder="기본 주소 (우편번호 검색 후 자동 입력)"
                    style="margin-top:8px;max-width:480px;background:var(--gray-light);color:var(--gray-mid)" disabled>
                  <input type="text" class="form-control" id="fAddr2" value="${m.addr2}"
                    placeholder="상세 주소 (동·호수 등 직접 입력)"
                    style="margin-top:8px;max-width:480px">
                  <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin-top:8px">
                    <input type="checkbox" id="fOverseas"${m.overseas ? ' checked' : ''}
                      onchange="MemberDetail.toggleOverseas(this.checked)"> 해외 거주
                  </label>
                </div>

                <!-- 직업 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">직업</label>
                  <select class="form-control" id="fJob" style="max-width:200px">
                    ${JOBS.map(j => `<option${j === m.job ? ' selected' : ''}>${j}</option>`).join('')}
                  </select>
                </div>

                <!-- 마케팅 수신 동의 -->
                <div class="form-group" style="margin:0">
                  <label class="form-label">마케팅 수신 동의</label>
                  <div style="display:flex;align-items:center;margin-top:6px;font-size:14px">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                      <input type="checkbox" id="fMarketing"${m.marketing ? ' checked' : ''}> 동의함
                    </label>
                    ${marketingHint}
                  </div>
                </div>

              </div>
            </div>

            <!-- ② 관리 정보 -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">관리 정보</span>
                <span style="font-size:12px;color:var(--gray-mid)">관리자 전용</span>
              </div>
              <div style="padding:20px;display:flex;flex-direction:column;gap:16px">

                <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
                  <div class="form-group" style="margin:0">
                    <label class="form-label">회원 등급</label>
                    <select class="form-control" id="fGrade">
                      <option value="member"     ${m.grade === 'member'     ? 'selected' : ''}>일반회원</option>
                      <option value="fullMember" ${m.grade === 'fullMember' ? 'selected' : ''}>정회원</option>
                      <option value="admin"      ${m.grade === 'admin'      ? 'selected' : ''}>관리자</option>
                    </select>
                  </div>
                  <div class="form-group" style="margin:0">
                    <label class="form-label">계정 상태</label>
                    <select class="form-control" id="fStatus">
                      <option value="active"   ${m.status === 'active'   ? 'selected' : ''}>정상</option>
                      <option value="inactive" ${m.status === 'inactive' ? 'selected' : ''}>비활성</option>
                    </select>
                  </div>
                  <div class="form-group" style="margin:0">
                    <label class="form-label">가입일</label>
                    <input type="text" class="form-control" value="${m.joinDate}" disabled
                      style="background:var(--gray-light);color:var(--gray-mid)">
                  </div>
                  <div class="form-group" style="margin:0">
                    <label class="form-label">가입 경로</label>
                    <select class="form-control" id="fChannel">
                      ${CHANNELS.map(c => `<option${c === m.channel ? ' selected' : ''}>${c}</option>`).join('')}
                    </select>
                  </div>
                </div>

                <div class="form-group" style="margin:0">
                  <label class="form-label">관리자 메모</label>
                  <textarea class="form-control" id="fMemo" rows="3"
                    placeholder="내부 메모 (회원에게 노출되지 않음)">${m.memo}</textarea>
                </div>

              </div>
            </div>

            <!-- ③ 강좌 신청 내역 (TASK 1-2) -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">강좌 신청 내역</span>
                <span style="font-size:12px;color:var(--gray-mid)">${m.apps.length}건</span>
              </div>
              ${appsHtml}
            </div>

          </div>`;

        /* 해외거주 초기 상태 반영 */
        if (m.overseas) this.toggleOverseas(true);
      },

      save() {
        const name = document.getElementById('fName')?.value.trim();
        if (!name) { App.toast('이름을 입력해주세요.', 'warning'); return; }
        App.toast(`${name}님의 회원 정보가 저장되었습니다.`);
      },

      toggleStatus() {
        const sel = document.getElementById('fStatus');
        if (!sel) return;
        const next = sel.value === 'active' ? 'inactive' : 'active';
        sel.value = next;
        document.getElementById('deactivateBtn').textContent =
          next === 'active' ? '비활성 처리' : '정상 처리';
        App.toast(
          next === 'inactive'
            ? '비활성으로 변경되었습니다. 저장을 눌러 확정하세요.'
            : '정상으로 변경되었습니다. 저장을 눌러 확정하세요.',
          'info'
        );
      },

      resetPw() {
        const m = this._member;
        if (!m) return;
        App.toast(`${m.email}으로 임시 비밀번호가 발송되었습니다. (실제 구현 시 서버 API 연동)`);
      },

      searchAddr() {
        App.toast('우편번호 찾기 — 실제 구현 시 Kakao 주소 API 연동 예정', 'info');
      },

      toggleOverseas(checked) {
        const zipEl  = document.getElementById('fZip');
        const addr1  = document.getElementById('fAddr1');
        const addr2  = document.getElementById('fAddr2');
        const searchBtn = document.getElementById('addrSearchBtn');
        [zipEl, searchBtn].forEach(el => { if (el) el.disabled = checked; });
        if (addr1) {
          addr1.disabled = true; /* 항상 disabled, API 연동용 */
          addr1.style.opacity = checked ? '0.4' : '1';
        }
        if (addr2) addr2.disabled = checked;
      },
    };

    MemberDetail.init();
  </script>
</body>
</html>
