<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사공단 소식 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="sagongdan">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>사회공헌사업단 소식</h1>
      <p>정회원 전용 | 사회공헌 활동 소식 및 일지</p>
    </div>
  </div>

  <div class="page-tabs">
    <a href="competency.html" class="page-tab ">역량강화 교육강좌</a>
    <a href="mentoring.html" class="page-tab ">멘토링 숲학교</a>
    <a href="recruit.html" class="page-tab ">수시숲해설 모집</a>
    <a href="instructor.html" class="page-tab ">숲해설 강사 신청</a>
    <a href="sagongdan.html" class="page-tab  active">사공단 소식</a>
    <a href="club.html" class="page-tab ">동아리 소식</a>
    <a href="qna.html" class="page-tab ">이게뭐예요</a>
  </div>

  <div class="content-wrap">

    <div class="alert alert-info" style="margin-bottom:24px">
      사회공헌사업단 게시판은 <strong>정회원 전용</strong> 메뉴입니다.
    </div>

    <!-- 목록 영역 -->
    <div id="sagongdanListWrap">
      <!-- 탭: 소식 / 일지 -->
      <div class="tabs" style="margin-bottom:24px">
        <button class="tab-btn active" onclick="SagongdanCtrl.switchTab('news', this)">사공단 소식</button>
        <button class="tab-btn" onclick="SagongdanCtrl.switchTab('log', this)">사공단 일지</button>
      </div>

      <!-- 소식 탭 -->
      <div id="tab-news">
        <div class="search-wrap">
          <div class="search-field">
            <label>검색</label>
            <input type="text" class="form-control" id="newsKeyword" placeholder="제목 검색" style="min-width:220px"
              onkeydown="if(event.key==='Enter') SagongdanCtrl.searchNews()">
          </div>
          <button class="btn btn-primary search-btn" onclick="SagongdanCtrl.searchNews()">검색</button>
          <button class="btn btn-gray search-btn" onclick="SagongdanCtrl.resetNews()">초기화</button>
        </div>
        <div class="list-top">
          <span class="list-count">전체 <strong id="newsCount">0</strong>건</span>
        </div>
        <div class="table-wrap">
          <table class="board-table">
            <thead>
              <tr>
                <th style="width:120px">번호</th>
                <th>제목</th>
                <th style="width:90px">작성자</th>
                <th style="width:180px">작성일</th>
              </tr>
            </thead>
            <tbody id="newsTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="newsPagination"></div>
      </div>

      <!-- 일지 탭 -->
      <div id="tab-log" style="display:none">
        <div class="alert alert-warning" style="margin-bottom:16px">
          파일 업로드 용량 제한: 파일당 최대 <strong>10MB</strong> / 허용 형식: JPG, PNG, PDF, HWP, DOCX
        </div>
        <div class="search-wrap">
          <div class="search-field">
            <label>검색</label>
            <input type="text" class="form-control" id="logKeyword" placeholder="제목 검색" style="min-width:220px"
              onkeydown="if(event.key==='Enter') SagongdanCtrl.searchLog()">
          </div>
          <button class="btn btn-primary search-btn" onclick="SagongdanCtrl.searchLog()">검색</button>
          <button class="btn btn-gray search-btn" onclick="SagongdanCtrl.resetLog()">초기화</button>
        </div>
        <div class="list-top">
          <span class="list-count">전체 <strong id="logCount">0</strong>건</span>
        </div>
        <div class="table-wrap">
          <table class="board-table">
            <thead>
              <tr>
                <th style="width:60px">번호</th>
                <th>제목</th>
                <th style="width:90px">작성자</th>
                <th style="width:90px">활동일</th>
                <th style="width:60px">첨부</th>
                <th style="width:110px">작성일</th>
              </tr>
            </thead>
            <tbody id="logTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="logPagination"></div>
      </div>
    </div>

    <!-- 상세 영역 (id 파라미터 있을 때 노출) -->
    <div id="sagongdanDetailWrap" style="display:none">
      <div id="sagongdanDetail"></div>
    </div>

  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/member.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    SagongdanCtrl.init();
  </script>
</body>

</html>
