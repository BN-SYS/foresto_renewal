<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수시숲해설 모집 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/member.css">
</head>

<body data-page="recruit">
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>회원 활동</h1>
      <p>협회 회원을 위한 다양한 활동과 프로그램을 안내합니다.</p>
    </div>
  </div>

  <div class="page-tabs">
    <span class="page-tab-group">숲해설</span>
    <a href="recruit.html" class="page-tab  active">숲해설 모집</a>
    <a href="instructor.html" class="page-tab ">숲해설 신청</a>
  </div>

  <div class="content-wrap">

    <div class="list-top">
      <span class="list-count">Total <strong id="recruitCount">0</strong>건</span>
      <div class="list-search">
        <input type="text" class="list-search-input" id="recruitKeyword" placeholder="검색어를 입력하세요"
          onkeydown="if(event.key==='Enter') RecruitCtrl.search()">
        <button class="list-search-btn" onclick="RecruitCtrl.search()">검색</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:60px">번호</th>
            <th>제목</th>
            <th style="width:100px">작성자</th>
            <th style="width:110px">작성일</th>
          </tr>
        </thead>
        <tbody id="recruitTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="recruitPagination"></div>

  </div>

  <div id="ftr"></div>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/member.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
