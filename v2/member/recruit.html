<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수시숲해설 모집 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/education.css">
  <link rel="stylesheet" href="../assets/css/pages/member.css">
</head>

<body data-page="recruit">
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>회원 활동</h1>
      <p>협회 회원을 위한 다양한 활동과 프로그램을 안내합니다.</p>
    </div>
  </div>

  <div class="page-tabs">
    <a href="competency.html" class="page-tab ">역량강화 교육강좌</a>
    <a href="mentoring.html" class="page-tab ">멘토링 숲학교</a>
    <a href="recruit.html" class="page-tab  active">수시숲해설 모집</a>
    <a href="instructor.html" class="page-tab ">숲해설 강사 신청</a>
    <a href="sagongdan.html" class="page-tab ">사공단 소식</a>
    <a href="club.html" class="page-tab ">동아리 소식</a>
    <a href="qna.html" class="page-tab ">이게뭐예요</a>
  </div>

  <div class="content-wrap">

    <!-- 안내 배너 -->
    <div class="member-intro-banner">
      <div class="member-intro-text">
        <h3>수시숲해설 모집</h3>
        <p>지역 학교·복지관·공원 등에서 진행되는 숲해설 봉사 및 유급 활동 모집 공고를 안내합니다.<br>
          모집 중인 공고에 지원하여 현장 활동 경험을 쌓아보세요.</p>
      </div>
    </div>

    <!-- 검색 -->
    <div class="search-wrap">
      <div class="search-field">
        <label>모집 상태</label>
        <select class="form-control" id="recruitStatus">
          <option value="">전체</option>
          <option value="open">모집중</option>
          <option value="closed">마감</option>
        </select>
      </div>
      <div class="search-field">
        <label>키워드</label>
        <input type="text" class="form-control" id="recruitKeyword" placeholder="제목 검색" style="min-width:200px">
      </div>
      <button class="btn btn-primary search-btn" onclick="RecruitCtrl.search()">검색</button>
      <button class="btn btn-gray search-btn" onclick="RecruitCtrl.reset()">초기화</button>
    </div>

    <div class="list-top">
      <div class="list-count">전체 <strong id="recruitCount">0</strong>건</div>
    </div>

    <div class="table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:60px">번호</th>
            <th>모집 공고</th>
            <th style="width:100px">활동 기간</th>
            <th style="width:80px">모집 인원</th>
            <th style="width:90px">상태</th>
            <th style="width:110px">등록일</th>
          </tr>
        </thead>
        <tbody id="recruitTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="recruitPagination"></div>

  </div>

  <div id="ftr"></div>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/member.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
