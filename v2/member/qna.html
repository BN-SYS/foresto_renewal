<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이게뭐예요 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body data-page="qna">
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>이게뭐예요?</h1>
      <p>정회원 전용 | 식물·곤충·버섯 등 자연물 식별 질문 게시판</p>
    </div>
  </div>

  <div class="content-wrap">

    <!-- 접근 안내 -->
    <div class="alert alert-info" style="margin-bottom:20px">
      이게뭐예요 게시판은 <strong>정회원 전용</strong> 메뉴입니다.
      사진을 첨부해 식물·곤충·버섯 등 자연물 식별 질문을 남겨주세요.
    </div>

    <!-- 상단 액션 -->
    <div class="list-top" style="margin-bottom:16px">
      <span class="list-count">Total <strong id="qnaCount">0</strong>건</span>
      <div class="list-top-right">
        <div class="list-search">
          <input type="text" class="list-search-input" id="qnaKeyword" placeholder="검색어를 입력하세요"
            onkeydown="if(event.key==='Enter') QnaCtrl.search()">
          <button class="list-search-btn" onclick="QnaCtrl.search()">검색</button>
        </div>
        <button class="btn btn-primary"
                onclick="location.href='qna-write.html'">질문 작성</button>
      </div>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:60px">번호</th>
            <th>질문 제목</th>
            <th style="width:90px">작성자</th>
            <th style="width:120px">상태</th>
            <th style="width:180px">등록일</th>
          </tr>
        </thead>
        <tbody id="qnaTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="qnaPagination"></div>

  </div>

  <div id="ftr"></div>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/member.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>
</html>
