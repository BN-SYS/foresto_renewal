<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멘토링 숲학교 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head> 
<body>

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>멘토링 숲학교</h1>
      <p>회원 전용 | 선배 해설가와 함께하는 현장 멘토링 프로그램</p>
    </div>
  </div>

  <div class="page-tabs">
    <a href="competency.html" class="sub-nav-item">역량강화 교육강좌</a>
    <a href="mentoring.html" class="sub-nav-item active">멘토링 숲학교</a>
    <a href="recruit.html" class="sub-nav-item">수시숲해설 모집</a>
    <a href="instructor.html" class="sub-nav-item">숲해설 강사 신청</a>
    <a href="sagongdan.html" class="sub-nav-item">사공단 소식</a>
    <a href="club.html" class="sub-nav-item">동아리 소식</a>
    <a href="qna.html" class="sub-nav-item">이게뭐예요</a>
  </div>

  <div class="content-wrap">

    <div class="alert alert-info" style="margin-bottom:24px">
      멘토링 숲학교는 <strong>정회원 전용</strong> 메뉴입니다.
    </div>

    <!-- 검색 -->
    <div class="search-wrap">
      <div class="search-field">
        <label>검색</label>
        <input type="text" class="form-control" id="searchKeyword" placeholder="제목 검색" style="min-width:220px"
          onkeydown="if(event.key==='Enter') MentoringBoard.search(document.getElementById('searchKeyword').value)">
      </div>
      <button class="btn btn-primary search-btn"
        onclick="MentoringBoard.search(document.getElementById('searchKeyword').value)">검색</button>
      <button class="btn btn-gray search-btn"
        onclick="document.getElementById('searchKeyword').value='';MentoringBoard.search('')">초기화</button>
    </div>

    <div class="list-top">
      <span class="list-count">전체 <strong id="mentoringCount">0</strong>건</span>
    </div>

    <div class="table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:60px">번호</th>
            <th>제목</th>
            <th style="width:90px">작성자</th>
            <th style="width:180px">작성일</th>
            <th style="width:70px">조회</th>
          </tr>
        </thead>
        <tbody id="mentoringTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="mentoringPagination"></div>

  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/member.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    MentoringBoard.init();
  </script>
</body>

</html>
