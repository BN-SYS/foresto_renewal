<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>협회소식지 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="newsletter">

  <div id="hdr"></div>

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div class="container">
      <h1>협회소식지</h1>
      <p>한국숲해설가협회의 주요 소식과 활동을 담은 정기 소식지입니다.</p>
    </div>
  </div>

  <!-- 서브 내비 -->
  <div class="page-tabs">
    <a href="notice-list.html" class="page-tab ">공지사항</a>
    <a href="calendar.html" class="page-tab ">협회일정</a>
    <a href="free.html" class="page-tab ">자유게시판</a>
    <a href="press.html" class="page-tab ">언론보도</a>
    <a href="job.html" class="page-tab ">일자리 및 교육정보</a>
    <a href="gallery.html" class="page-tab ">갤러리</a>
    <a href="newsletter.html" class="page-tab  active">협회소식지</a>
    <a href="archive.html" class="page-tab ">자료실</a>
  </div>

  <main>
    <div class="content-wrap">

      <!-- 최신호 배너 -->
      <div class="nl-latest-banner" id="nlLatestBanner">
        <!-- JS 렌더 -->
      </div>

      <!-- 검색 + 뷰 전환 -->
      <div style="display:flex;align-items:flex-end;justify-content:space-between;
                  gap:16px;flex-wrap:wrap;margin-bottom:16px;">
        <div style="display:flex;gap:8px;flex:1;min-width:200px;">
          <input type="text" class="form-control" id="nlSearchInput" placeholder="소식지 검색" style="max-width:280px;"
            onkeydown="if(event.key==='Enter') NewsletterCtrl.search()">
          <button class="btn btn-primary btn-sm" onclick="NewsletterCtrl.search()">검색</button>
          <button class="btn btn-gray btn-sm" onclick="NewsletterCtrl.reset()">초기화</button>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="list-count">
            총 <strong id="nlCount">0</strong>건
          </span>
          <div class="view-toggle">
            <button class="view-btn active" id="viewCard" title="카드형"
              onclick="NewsletterCtrl.setView('card', this)">⊞</button>
            <button class="view-btn" id="viewList" title="목록형" onclick="NewsletterCtrl.setView('list', this)">☰</button>
          </div>
        </div>
      </div>

      <!-- 연도 필터 탭 -->
      <div class="year-tabs" id="yearTabs">
        <!-- JS 렌더 -->
      </div>

      <!-- 카드형 뷰 -->
      <div id="viewCardWrap">
        <div class="newsletter-grid" id="nlGrid">
          <!-- JS 렌더 -->
        </div>
        <div id="nlPagination" class="pagination"></div>
      </div>

      <!-- 목록형 뷰 -->
      <div id="viewListWrap" style="display:none;">
        <div class="table-wrap">
          <table class="board-table" style="border-top:2px solid var(--gray-dark)">
            <thead>
              <tr>
                <th style="width:60px">번호</th>
                <th>소식지명</th>
                <th style="width:120px">발행일</th>
                <th style="width:80px">조회</th>
                <th style="width:100px">다운로드</th>
              </tr>
            </thead>
            <tbody id="nlTableBody">
              <!-- JS 렌더 -->
            </tbody>
          </table>
        </div>
        <div id="nlListPagination" class="pagination"></div>
      </div>

    </div>
  </main>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
