<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일자리 및 교육정보 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">

</head>

<body data-page="job">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>일자리 및 교육정보</h1>
      <p>숲해설 관련 채용, 교육, 자격, 공모 정보를 제공합니다.</p>
    </div>
  </div>

  <div class="page-tabs">
    <a href="notice-list.html" class="page-tab ">공지사항</a>
    <a href="calendar.html" class="page-tab ">협회일정</a>
    <a href="free.html" class="page-tab ">자유게시판</a>
    <a href="press.html" class="page-tab ">언론보도</a>
    <a href="job.html" class="page-tab  active">일자리 및 교육정보</a>
    <a href="gallery.html" class="page-tab ">갤러리</a>
    <a href="newsletter.html" class="page-tab ">협회소식지</a>
    <a href="archive.html" class="page-tab ">자료실</a>
  </div>

  <main>
    <div class="content-wrap">

      <!-- 검색 -->
      <div class="search-wrap">
        <div class="search-field" style="flex:1;min-width:200px">
          <label>검색어</label>
          <input type="text" class="form-control" id="jobKeyword" placeholder="제목 검색"
            onkeydown="if(event.key==='Enter') JobCtrl.search()">
        </div>
        <button class="btn btn-primary search-btn" onclick="JobCtrl.search()">검색</button>
        <button class="btn btn-gray search-btn" onclick="JobCtrl.reset()">초기화</button>
      </div>

      <!-- 목록 상단 -->
      <div class="list-top">
        <span class="list-count">전체 <strong id="jobCount">0</strong>건</span>
      </div>

      <!-- 게시판 테이블 -->
      <div class="table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th style="width:120px">번호</th>
              <th class="col-title">제목</th>
              <th style="width:80px">작성자</th>
              <th style="width:110px">등록일</th>
              <th style="width:60px">조회</th>
            </tr>
          </thead>
          <tbody id="jobTableBody">
            <!-- JS 렌더 -->
          </tbody>
        </table>
      </div>

      <div id="jobPagination" class="pagination"></div>

    </div>
  </main>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
