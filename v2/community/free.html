<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유게시판 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="free">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>자유게시판</h1>
      <p>회원들이 자유롭게 소통하는 공간입니다.</p>
    </div>
  </div>
  <main>
    <div class="content-wrap">

      <!-- 권한 안내 배너 -->
      <div class="alert alert-info" style="margin-bottom:20px">
        <div>
          <strong>자유게시판은 일반회원 이상</strong> 이용 가능합니다.
          건전한 토론 문화를 위해 비방·욕설 게시물은 삭제될 수 있습니다.
        </div>
      </div>

      <!-- 검색 -->
      <!-- 목록 상단 -->
      <div class="list-top">
        <span class="list-count">Total <strong id="freeCount">0</strong>건</span>
        <div class="list-top-right">
          <div class="list-search">
            <select class="list-search-type" id="freeSearchType">
              <option value="title">제목</option>
              <option value="content">내용</option>
              <option value="author">작성자</option>
            </select>
            <input type="text" class="list-search-input" id="freeKeyword" placeholder="검색어를 입력하세요"
              onkeydown="if(event.key==='Enter') FreeCtrl.search()">
            <button class="list-search-btn" onclick="FreeCtrl.search()">검색</button>
          </div>
          <button class="btn btn-primary btn-sm" onclick="location.href='free-write.html'">글쓰기</button>
        </div>
      </div>

      <!-- 게시판 테이블 -->
      <div class="table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th style="width:60px">번호</th>
              <th>제목</th>
              <th style="width:90px">작성자</th>
              <th style="width:110px">작성일</th>
              <th style="width:60px">추천</th>
            </tr>
          </thead>
          <tbody id="freeTableBody">
            <!-- JS 렌더 -->
          </tbody>
        </table>
      </div>

      <div id="freePagination" class="pagination"></div>

    </div>
  </main>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
