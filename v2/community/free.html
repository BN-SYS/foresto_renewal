<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유게시판 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="free">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>자유게시판</h1>
      <p>회원들이 자유롭게 소통하는 공간입니다.</p>
    </div>
  </div>

  <div class="page-tabs">
    <a href="notice-list.html" class="page-tab ">공지사항</a>
    <a href="calendar.html" class="page-tab ">협회일정</a>
    <a href="free.html" class="page-tab  active">자유게시판</a>
    <a href="press.html" class="page-tab ">언론보도</a>
    <a href="job.html" class="page-tab ">일자리 및 교육정보</a>
    <a href="gallery.html" class="page-tab ">갤러리</a>
    <a href="newsletter.html" class="page-tab ">협회소식지</a>
    <a href="archive.html" class="page-tab ">자료실</a>
  </div>

  <main>
    <div class="content-wrap">

      <!-- 권한 안내 배너 -->
      <div class="alert alert-info" style="margin-bottom:20px">
        <span>✏️</span>
        <div>
          <strong>자유게시판은 일반회원 이상</strong> 이용 가능합니다.
          건전한 토론 문화를 위해 비방·욕설 게시물은 삭제될 수 있습니다.
        </div>
      </div>

      <!-- 검색 -->
      <div class="search-wrap">
        <div class="search-field">
          <label>검색 유형</label>
          <select class="form-control" id="freeSearchType" style="min-width:100px">
            <option value="title">제목</option>
            <option value="content">내용</option>
            <option value="author">작성자</option>
          </select>
        </div>
        <div class="search-field" style="flex:1;min-width:180px">
          <label>검색어</label>
          <input type="text" class="form-control" id="freeKeyword" placeholder="검색어 입력"
            onkeydown="if(event.key==='Enter') FreeCtrl.search()">
        </div>
        <button class="btn btn-primary search-btn" onclick="FreeCtrl.search()">검색</button>
        <button class="btn btn-gray search-btn" onclick="FreeCtrl.reset()">초기화</button>
      </div>

      <!-- 목록 상단 -->
      <div class="list-top">
        <span class="list-count">전체 <strong id="freeCount">0</strong>건</span>
        <button class="btn btn-primary btn-sm" onclick="FreeCtrl.openWriteModal()">✏️ 글쓰기</button>
      </div>

      <!-- 게시판 테이블 -->
      <div class="table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th style="width:60px">번호</th>
              <th>제목</th>
              <th style="width:90px">작성자</th>
              <th style="width:110px">작성일</th>
              <th style="width:60px">조회</th>
              <th style="width:60px">추천</th>
            </tr>
          </thead>
          <tbody id="freeTableBody">
            <!-- JS 렌더 -->
          </tbody>
        </table>
      </div>

      <div id="freePagination" class="pagination"></div>

    </div>
  </main>

  <!-- 글쓰기 모달 -->
  <div class="modal-overlay" id="freeWriteModal">
    <div class="modal" style="max-width:640px">
      <div class="modal-header">
        <h3>글쓰기</h3>
        <button class="modal-close" onclick="App.closeModal('freeWriteModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">제목 <span class="req">*</span></label>
          <input type="text" class="form-control" id="freeTitle" placeholder="제목을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">내용 <span class="req">*</span></label>
          <textarea class="form-control" id="freeContent" rows="8"
            placeholder="내용을 입력하세요.&#10;비방·욕설은 삭제될 수 있습니다."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">첨부파일</label>
          <input type="file" class="form-control" accept=".jpg,.png,.pdf,.hwp,.docx">
          <div class="form-hint">최대 10MB / JPG, PNG, PDF, HWP, DOCX</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="App.closeModal('freeWriteModal')">취소</button>
        <button class="btn btn-primary" onclick="FreeCtrl.savePost()">등록</button>
      </div>
    </div>
  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
