<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="notice">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>공지사항</h1>
      <p>협회 주요 공지 및 안내사항</p>
    </div>
  </div>
  
  <div class="page-tabs">
    <span class="page-tab-group">알림</span>
    <a href="notice-list.html" class="page-tab  active">공지사항</a>
    <a href="calendar.html" class="page-tab ">협회 캘린더</a>
    <a href="press.html" class="page-tab ">언론 보도</a>
    <a href="job.html" class="page-tab ">일자리정보</a>
  </div>

  <div class="content-wrap">

    <div class="list-top">
      <span class="list-count">Total <strong id="noticeCount">0</strong>건</span>
      <div class="list-search">
        <input type="text" class="list-search-input" id="noticeKeyword" placeholder="검색어를 입력하세요"
          onkeydown="if(event.key==='Enter') NoticeBoard.search(this.value)">
        <button class="list-search-btn"
          onclick="NoticeBoard.search(document.getElementById('noticeKeyword').value)">검색</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width: 120px">번호</th>
            <th class="col-title">제목</th>
            <th style="width:90px">작성자</th>
            <th style="width:110px">작성일</th>
          </tr>
        </thead>
        <tbody id="noticeTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="noticePagination"></div>

  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    NoticeBoard.init();
  </script>
</body>

</html>
