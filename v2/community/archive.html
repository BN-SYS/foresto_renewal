<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자료실 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="archive">

  <div id="hdr"></div>

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div class="container">
      <h1>자료실</h1>
      <p>회원 활동에 필요한 각종 자료를 공유합니다.</p>
    </div>
  </div>

  <!-- 서브 내비 -->
  <div class="page-tabs">
    <a href="notice-list.html" class="page-tab">공지사항</a>
    <a href="calendar.html" class="page-tab">협회일정</a>
    <a href="free.html" class="page-tab">자유게시판</a>
    <a href="press.html" class="page-tab">언론보도</a>
    <a href="job.html" class="page-tab">일자리 및 교육정보</a>
    <a href="gallery.html" class="page-tab">갤러리</a>
    <a href="newsletter.html" class="page-tab">협회소식지</a>
    <a href="archive.html" class="page-tab active">자료실</a>
  </div>

  <main>
    <div class="content-wrap">

      <!-- 검색 영역 -->
      <div class="search-wrap">
        <div class="search-field" style="flex:1;min-width:160px;">
          <label>검색어</label>
          <input type="text" class="form-control" id="archiveKeyword"
                 placeholder="제목 검색"
                 onkeydown="if(event.key==='Enter') ArchiveCtrl.search()">
        </div>
        <button class="btn btn-primary search-btn" onclick="ArchiveCtrl.search()">검색</button>
        <button class="btn btn-gray search-btn"    onclick="ArchiveCtrl.reset()">초기화</button>
      </div>

      <!-- 목록 상단 바 -->
      <div class="list-top">
        <span class="list-count">전체 <strong id="archiveCount">0</strong>건</span>
        <select class="form-control" id="archiveSortSelect"
                style="width:auto;height:36px;font-size:13px"
                onchange="ArchiveCtrl.changeSort(this.value)">
          <option value="latest">최신순</option>
        </select>
      </div>

      <!-- 자료 목록 테이블 -->
      <div class="table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th style="width:120px">번호</th>
              <th class="col-title">제목</th>
              <th style="width:80px">작성자</th>
              <th style="width:110px">등록일</th>
            </tr>
          </thead>
          <tbody id="archiveTableBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="archivePagination"></div>

    </div>
  </main>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community-media.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
