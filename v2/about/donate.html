<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>후원하기 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/about.css">
</head>

<body data-page="donate">

  <div id="hdr"></div>

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div class="container">
      <h1>후원하기</h1>
      <p>여러분의 소중한 후원이 숲 교육과 생태 문화를 함께 만들어 갑니다.</p>
    </div>
  </div>

  <!-- 서브 내비 -->
  <div class="page-tabs">
    <a href="index.html"        class="page-tab">인사말</a>
    <a href="vision.html"       class="page-tab">미션·비전</a>
    <a href="history.html"      class="page-tab">연혁</a>
    <a href="members.html"      class="page-tab">임원 소개</a>
    <a href="constitution.html" class="page-tab">정관</a>
    <a href="project.html"      class="page-tab">협회 사업</a>
    <a href="regions.html"      class="page-tab">전국지역협회</a>
    <a href="contact.html"      class="page-tab">오시는 길</a>
    <a href="donate.html"       class="page-tab active">후원하기</a>
  </div>

  <main>
    <div class="content-wrap">

      <!-- 후원 안내 -->
      <div class="donate-notice">
        한국숲해설가협회는 숲 해설 전문가 양성, 생태 교육 확산, 사회공헌 활동을 위해 여러분의 후원이 필요합니다.<br>
        후원금은 교육 프로그램 운영, 취약계층 숲 체험 지원, 생태 자료 개발 등에 사용됩니다.
      </div>

      <!-- 후원 유형 탭 -->
      <div class="donate-tabs">
        <button class="donate-tab active" id="donateTab_once"
                onclick="DonateCtrl.setTab('once')">일시후원</button>
        <button class="donate-tab" id="donateTab_regular"
                onclick="DonateCtrl.setTab('regular')">정기후원</button>
      </div>

      <!-- ── 일시후원 폼 ── -->
      <div id="donateForm_once" class="donate-form">
        <div class="form-group">
          <label>성함 <span class="req">*</span></label>
          <input type="text" class="form-control" id="donateName_once" placeholder="이름을 입력해주세요">
        </div>

        <div class="form-group">
          <label>후원 금액 <span class="req">*</span></label>
          <div class="amount-btns">
            <button class="amount-btn" data-amount="10000"
                    onclick="DonateCtrl.selectAmount('once', 10000)">1만원</button>
            <button class="amount-btn" data-amount="30000"
                    onclick="DonateCtrl.selectAmount('once', 30000)">3만원</button>
            <button class="amount-btn" data-amount="50000"
                    onclick="DonateCtrl.selectAmount('once', 50000)">5만원</button>
            <button class="amount-btn" data-amount="100000"
                    onclick="DonateCtrl.selectAmount('once', 100000)">10만원</button>
            <button class="amount-btn" data-amount="custom"
                    onclick="DonateCtrl.selectAmount('once', 'custom')">직접입력</button>
          </div>
          <input type="number" class="form-control" id="donateAmount_once"
                 placeholder="후원 금액을 입력해주세요 (원)" min="1000">
        </div>

        <div class="form-group">
          <label>연락처 <span class="req">*</span></label>
          <input type="tel" class="form-control" id="donatePhone_once"
                 placeholder="010-0000-0000">
        </div>

        <div class="form-group">
          <label>이메일</label>
          <input type="email" class="form-control" id="donateEmail_once"
                 placeholder="example@email.com">
        </div>

        <div style="margin-top:28px">
          <button class="btn btn-primary" style="min-width:140px"
                  onclick="DonateCtrl.submit('once')">일시후원 신청</button>
        </div>
      </div>

      <!-- ── 정기후원 폼 ── -->
      <div id="donateForm_regular" class="donate-form" style="display:none">
        <div class="form-group">
          <label>성함 <span class="req">*</span></label>
          <input type="text" class="form-control" id="donateName_regular" placeholder="이름을 입력해주세요">
        </div>

        <div class="form-group">
          <label>월 후원 금액 <span class="req">*</span></label>
          <div class="amount-btns">
            <button class="amount-btn" data-amount="10000"
                    onclick="DonateCtrl.selectAmount('regular', 10000)">1만원/월</button>
            <button class="amount-btn" data-amount="30000"
                    onclick="DonateCtrl.selectAmount('regular', 30000)">3만원/월</button>
            <button class="amount-btn" data-amount="50000"
                    onclick="DonateCtrl.selectAmount('regular', 50000)">5만원/월</button>
            <button class="amount-btn" data-amount="100000"
                    onclick="DonateCtrl.selectAmount('regular', 100000)">10만원/월</button>
            <button class="amount-btn" data-amount="custom"
                    onclick="DonateCtrl.selectAmount('regular', 'custom')">직접입력</button>
          </div>
          <input type="number" class="form-control" id="donateAmount_regular"
                 placeholder="월 후원 금액을 입력해주세요 (원)" min="1000">
        </div>

        <div class="form-group">
          <label>연락처 <span class="req">*</span></label>
          <input type="tel" class="form-control" id="donatePhone_regular"
                 placeholder="010-0000-0000">
        </div>

        <div class="form-group">
          <label>이메일</label>
          <input type="email" class="form-control" id="donateEmail_regular"
                 placeholder="example@email.com">
        </div>

        <div style="margin-top:28px">
          <button class="btn btn-primary" style="min-width:140px"
                  onclick="DonateCtrl.submit('regular')">정기후원 신청</button>
        </div>
      </div>

      <!-- ── 완료 화면 (JS 렌더) ── -->
      <div id="donateComplete" style="display:none"></div>

    </div>
  </main>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/about.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('협회소개', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
  </script>
</body>

</html>
