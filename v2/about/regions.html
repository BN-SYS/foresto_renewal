      { name:'인천협회',     area:'인천광역시',        members:142, since:2005, contact:'032-000-1004', rep:'○○○' },

    document.getElementById('regionGrid').innerHTML = REGIONS.map((r, i) => `
      <div class="gallery-card" onclick="App.toast('${r.name} 상세 페이지로 이동합니다.')">
        <div class="gallery-thumb-placeholder" style="font-size:36px">${EMOJIS[i]}</div>
        <div class="gallery-info">
          <div class="gallery-title">${r.name}</div>
          <div class="gallery-meta">
            <span>${r.area} &nbsp;|</span>
            <span>${r.members}명</span>
          </div>
          <div class="gallery-meta" style="margin-top:4px">
