<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | 한국숲해설가협회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <style>
        /* ── 전체 레이아웃 ── */
        .my-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
            align-items: start;
            padding: 32px 0 60px;
        }

        /* ── 사이드바 ── */
        .my-sidebar {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
            position: sticky;
            top: 90px;
        }

        .my-profile {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #dfe6e9;
            margin-bottom: 16px;
        }

        .my-avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #40916c, #2d6a4f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 10px;
        }

        .my-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .my-grade {
            font-size: 12px;
            padding: 3px 10px;
            background: #d8f3dc;
            color: #1b4332;
            border-radius: 12px;
            display: inline-block;
            font-weight: 600;
        }

        .side-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #636e72;
            transition: all .2s;
            margin-bottom: 2px;
            text-decoration: none;
            cursor: pointer;
        }

        .side-nav a:hover,
        .side-nav a.active {
            background: #d8f3dc;
            color: #2d6a4f;
            font-weight: 700;
        }

        /* ── 패널 공통 ── */
        .my-panel {
            display: none;
        }

        .my-panel.active {
            display: block;
        }

        /* ── 카드 섹션 ── */
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px 28px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .07);
            margin-bottom: 20px;
        }

        .info-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #2d6a4f;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e8f0eb;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── 폼 그리드 ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 20px;
        }

        .form-grid.col1 {
            grid-template-columns: 1fr;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-row label {
            font-size: 12px;
            font-weight: 600;
            color: #74a18a;
        }

        .form-row .form-control {
            height: 40px;
            font-size: 14px;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            padding: 0 12px;
            color: #2d3436;
            background: #fff;
            width: 100%;
            box-sizing: border-box;
        }

        .form-row .form-control:read-only {
            background: #f7faf8;
            color: #636e72;
        }

        .form-row .form-control:focus {
            outline: none;
            border-color: #40916c;
            box-shadow: 0 0 0 3px rgba(64, 145, 108, .12);
        }

        .input-with-btn {
            display: flex;
            gap: 8px;
        }

        .input-with-btn .form-control {
            flex: 1;
        }

        .btn-sub {
            height: 40px;
            padding: 0 14px;
            font-size: 12px;
            font-weight: 600;
            background: #fff;
            color: #2d6a4f;
            border: 1px solid #2d6a4f;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
        }

        .btn-sub:hover {
            background: #2d6a4f;
            color: #fff;
        }

        /* ── 약관동의 ── */
        .terms-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .terms-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: #f7faf8;
            border-radius: 8px;
            gap: 10px;
        }

        .terms-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terms-chk {
            width: 18px;
            height: 18px;
            accent-color: #2d6a4f;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms-label {
            font-size: 13px;
            font-weight: 500;
            color: #2d3436;
        }

        .terms-req {
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: #2d6a4f;
            padding: 2px 7px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .terms-opt {
            font-size: 11px;
            font-weight: 700;
            color: #636e72;
            background: #dfe6e9;
            padding: 2px 7px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .terms-date {
            font-size: 11px;
            color: #b2bec3;
        }

        .terms-view {
            font-size: 11px;
            color: #40916c;
            text-decoration: underline;
            cursor: pointer;
            white-space: nowrap;
        }

        /* ── 비밀번호 변경 섹션 ── */
        .pw-inline {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px 20px;
            align-items: end;
        }

        /* ── 저장/탈퇴 버튼 ── */
        .action-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-withdraw {
            padding: 10px 22px;
            font-size: 13px;
            background: #fff;
            color: #e17055;
            border: 1px solid #e17055;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-withdraw:hover {
            background: #e17055;
            color: #fff;
        }

        .btn-save {
            padding: 10px 28px;
            font-size: 13px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-save:hover {
            background: #1b4332;
        }

        /* ── 교육이수 탭/테이블 ── */
        .edu-filter-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #dfe6e9;
            margin-bottom: 16px;
        }

        .edu-tab {
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 500;
            color: #b2bec3;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            cursor: pointer;
            transition: color .2s, border-color .2s;
        }

        .edu-tab:hover {
            color: #40916c;
        }

        .edu-tab.active {
            color: #2d6a4f;
            font-weight: 700;
            border-bottom-color: #2d6a4f;
        }

        .edu-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .edu-stat-card {
            background: #f7faf8;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .edu-stat-card .num {
            font-size: 24px;
            font-weight: 700;
            color: #2d6a4f;
        }

        .edu-stat-card .lbl {
            font-size: 11px;
            color: #74a18a;
            margin-top: 2px;
        }

        .edu-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .edu-badge.done {
            background: #d8f3dc;
            color: #1b4332;
        }

        .edu-badge.progress {
            background: #fff3e0;
            color: #e65100;
        }

        .edu-badge.cancel {
            background: #f4f6f4;
            color: #b2bec3;
            border: 1px solid #dfe6e9;
        }

        .edu-badge.applied {
            background: #e3f2fd;
            color: #1565c0;
        }

        .btn-cert {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            color: #2d6a4f;
            border: 1px solid #2d6a4f;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            transition: background .15s, color .15s;
            text-decoration: none;
        }

        .btn-cert:hover {
            background: #2d6a4f;
            color: #fff;
        }

        .edu-page-btn {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dfe6e9;
            border-radius: 4px;
            background: #fff;
            font-size: 13px;
            color: #636e72;
            cursor: pointer;
        }

        .edu-page-btn:hover {
            border-color: #40916c;
            color: #40916c;
        }

        .edu-page-btn.active {
            background: #2d6a4f;
            color: #fff;
            border-color: #2d6a4f;
            font-weight: 700;
        }

        /* ── 모달 ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 28px 32px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0, 0, 0, .18);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2d3436;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* ── 수료증 모달 ── */
        .cert-preview {
            border: 3px solid #2d6a4f;
            border-radius: 8px;
            padding: 28px 36px;
            text-align: center;
            background: linear-gradient(180deg, #f9fbf9, #fff);
        }

        .cert-preview .cert-doc-title {
            font-size: 24px;
            font-weight: 700;
            color: #2d6a4f;
            margin: 16px 0;
            letter-spacing: 2px;
        }

        .cert-preview .cert-body {
            font-size: 14px;
            line-height: 2;
            color: #2d3436;
            border-top: 1px solid #dfe6e9;
            border-bottom: 1px solid #dfe6e9;
            padding: 14px 0;
            margin: 12px 0;
        }

        /* ── 반응형 ── */
        @media(max-width:900px) {
            .my-layout {
                grid-template-columns: 1fr;
            }

            .my-sidebar {
                position: static;
            }
        }

        @media(max-width:640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .pw-inline {
                grid-template-columns: 1fr;
            }

            .edu-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .edu-th-hide,
            .edu-td-hide {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="header-wrap"></div>

    <div class="page-header">
        <div class="container">
            <h1>마이페이지</h1>
            <p></p>
        </div>
    </div>
    <div class="container">
    <div class="my-layout">
        <!-- ── 사이드바 ── -->
        <aside class="my-sidebar">
            <div class="my-profile">
                <div class="my-avatar">🌿</div>
                <div class="my-name" id="sidebarName">김숲해</div>
                <div class="my-grade">정회원</div>
                <div style="font-size:11px;color:#b2bec3;margin-top:6px;" id="sidebarJoin">2022.03.15 가입</div>
            </div>
            <nav class="side-nav">
                <a onclick="showPanel('info')" id="nav-info">회원정보 수정</a>
                <a onclick="showPanel('cert')" id="nav-cert">교육이수내역</a>
            </nav>
        </aside>

        <!-- ── 메인 콘텐츠 ── -->
        <main>

            <!-- ══ 패널: 회원정보 수정 ══ -->
            <div class="my-panel" id="panel-info">
햣 ㅁㅇㅇ 
                <!-- 기본 정보 -->
                <div class="info-card">
                    <div class="info-card-title">기본 정보</div>
                    <div class="form-grid">
                        <div class="form-row">
                            <label>이름</label>
                            <input class="form-control" id="infoName" value="김숲해">
                        </div>
                        <div class="form-row">
                            <label>아이디</label>
                            <input class="form-control" id="infoId" value="forest2022" readonly>
                        </div>
                        <div class="form-row">
                            <label>생년월일</label>
                            <input class="form-control" id="infoBirth" value="1990-03-15" readonly>
                        </div>
                        <div class="form-row">
                            <label>성별</label>
                            <input class="form-control" id="infoGender" value="여성" readonly>
                        </div>
                        <div class="form-row">
                            <label>이메일</label>
                            <input class="form-control" type="email" id="infoEmail" value="forest@example.com">
                        </div>
                        <div class="form-row">
                            <label>연락처 <span style="color:#e17055;font-size:10px;">(본인인증 필요)</span></label>
                            <div class="input-with-btn">
                                <input class="form-control" id="infoPhone" value="010-1234-5678" readonly>
                                <button class="btn-sub" onclick="App.toast('본인인증 서비스 준비 중입니다.')">본인인증</button>
                            </div>
                        </div>
                        <div class="form-row" style="grid-column:1/-1;">
                            <label>주소 <span style="color:#e17055;font-size:10px;">(도로명주소)</span></label>
                            <div class="input-with-btn">
                                <input class="form-control" id="infoPostcode" value="03152" style="max-width:120px;"
                                    readonly placeholder="우편번호">
                                <button class="btn-sub" onclick="App.toast('주소 API 서비스 준비 중입니다.')">주소 검색</button>
                            </div>
                            <input class="form-control" id="infoAddr1" value="서울특별시 종로구 삼청로 00" readonly
                                style="margin-top:6px;">
                            <input class="form-control" id="infoAddr2" placeholder="상세주소" style="margin-top:6px;">
                        </div>
                    </div>
                </div>

                <!-- 협회 정보 -->
                <div class="info-card">
                    <div class="info-card-title">협회 정보</div>
                    <div class="form-grid">
                        <div class="form-row">
                            <label>가입일</label>
                            <input class="form-control" id="infoJoinDate" value="2022-03-15" readonly>
                        </div>
                        <div class="form-row">
                            <label>기수</label>
                            <input class="form-control" id="infoBatch" value="15기" readonly>
                        </div>
                        <div class="form-row">
                            <label>소속 지역협회</label>
                            <select class="form-control" id="infoRegion">
                                <option>서울</option>
                                <option>경기</option>
                                <option selected>인천</option>
                                <option>강원</option>
                                <option>충북</option>
                                <option>충남</option>
                                <option>전북</option>
                                <option>전남</option>
                                <option>경북</option>
                                <option>경남</option>
                                <option>제주</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <label>소속 동아리</label>
                            <select class="form-control" id="infoClub">
                                <option value="">동아리 미가입</option>
                                <option selected>나무반지</option>
                                <option>초록발자국</option>
                                <option>숲소리</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 비밀번호 변경 -->
                <div class="info-card">
                    <div class="info-card-title">비밀번호 변경</div>
                    <div class="pw-inline">
                        <div class="form-row">
                            <label>현재 비밀번호</label>
                            <input class="form-control" type="password" id="pwCurrent" placeholder="현재 비밀번호">
                        </div>
                        <div class="form-row">
                            <label>새 비밀번호</label>
                            <input class="form-control" type="password" id="pwNew" placeholder="영문+숫자+특수 8자 이상">
                        </div>
                        <div class="form-row">
                            <label>새 비밀번호 확인</label>
                            <div class="input-with-btn">
                                <input class="form-control" type="password" id="pwConfirm" placeholder="비밀번호 재입력">
                                <button class="btn-sub" onclick="changePw()">변경</button>
                            </div>
                        </div>
                    </div>
                    <p id="pwMsg" style="font-size:12px;margin-top:8px;"></p>
                </div>

                <!-- 약관동의 -->
                <div class="info-card">
                    <div class="info-card-title">약관동의 내역</div>
                    <div class="terms-list" id="termsList"></div>
                </div>

                <!-- 저장/탈퇴 -->
                <div class="action-row">
                    <button class="btn-withdraw" onclick="openWithdraw()">탈퇴하기</button>
                    <button class="btn-save" onclick="saveInfo()">저장하기</button>
                </div>
            </div><!-- /panel-info -->

            <!-- ══ 패널: 교육이수내역 ══ -->
            <div class="my-panel" id="panel-cert">
                <div class="info-card">
                    <div class="info-card-title">📋 교육이수내역</div>

                    <div class="edu-stats">
                        <div class="edu-stat-card">
                            <div class="num" id="statTotal">0</div>
                            <div class="lbl">전체</div>
                        </div>
                        <div class="edu-stat-card">
                            <div class="num" id="statDone">0</div>
                            <div class="lbl">이수완료</div>
                        </div>
                        <div class="edu-stat-card">
                            <div class="num" id="statProgress">0</div>
                            <div class="lbl">수강중</div>
                        </div>
                        <div class="edu-stat-card">
                            <div class="num" id="statApplied">0</div>
                            <div class="lbl">신청완료</div>
                        </div>
                    </div>

                    <div class="edu-filter-tabs">
                        <button class="edu-tab active" onclick="filterEdu('all',this)">전체</button>
                        <button class="edu-tab" onclick="filterEdu('done',this)">이수완료</button>
                        <button class="edu-tab" onclick="filterEdu('progress',this)">수강중</button>
                        <button class="edu-tab" onclick="filterEdu('applied',this)">신청완료</button>
                        <button class="edu-tab" onclick="filterEdu('cancel',this)">취소</button>
                    </div>

                    <div style="overflow-x:auto;">
                        <table class="board-table" style="min-width:640px;width:100%;">
                            <thead>
                                <tr>
                                    <th style="width:44px;">NO.</th>
                                    <th>강좌명</th>
                                    <th style="width:120px;" class="edu-th-hide">구분</th>
                                    <th style="width:110px;" class="edu-th-hide">수강일자</th>
                                    <th style="width:80px;">이수시간</th>
                                    <th style="width:80px;">상태</th>
                                    <th style="width:80px;">수료증</th>
                                </tr>
                            </thead>
                            <tbody id="eduTableBody">
                                <tr>
                                    <td colspan="7" style="text-align:center;padding:32px;color:#b2bec3;">데이터를 불러오는
                                        중...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="eduPagination"
                        style="display:flex;justify-content:center;gap:4px;margin-top:16px;flex-wrap:wrap;"></div>
                </div>
            </div><!-- /panel-cert -->

        </main>
    </div>
    </div>

    <div id="footer-wrap"></div>

    <!-- ── 탈퇴 모달 ── -->
    <div class="modal-overlay" id="withdrawModal">
        <div class="modal-box">
            <div class="modal-title">회원 탈퇴</div>
            <p style="font-size:14px;color:#636e72;line-height:1.7;margin-bottom:14px;">탈퇴 시 모든 정보가 삭제되며 복구가
                불가능합니다.<br>탈퇴 사유를 입력해주세요.</p>
            <textarea id="withdrawReason" rows="4"
                style="width:100%;border:1px solid #dfe6e9;border-radius:6px;padding:10px;font-size:13px;resize:none;box-sizing:border-box;"
                placeholder="탈퇴 사유를 입력하세요."></textarea>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-top:12px;cursor:pointer;">
                <input type="checkbox" id="withdrawAgree" style="accent-color:#e17055;"> 위 내용을 확인하였으며 탈퇴에 동의합니다.
            </label>
            <div class="modal-actions">
                <button class="btn-sub" onclick="closeWithdraw()">취소</button>
                <button class="btn-withdraw" onclick="doWithdraw()">탈퇴하기</button>
            </div>
        </div>
    </div>

    <!-- ── 수료증 모달 ── -->
    <div class="modal-overlay" id="certModal">
        <div class="modal-box" style="width:520px;">
            <div id="certPreviewArea"></div>
            <div class="modal-actions">
                <button class="btn-sub"
                    onclick="document.getElementById('certModal').classList.remove('open')">닫기</button>
                <button class="btn-save" onclick="App.toast('수료증 다운로드가 준비 중입니다.')">다운로드</button>
            </div>
        </div>
    </div>
    <script src="common.js"></script>
    <script>
        /* ── 헤더/푸터 ── */
        document.getElementById('header-wrap').innerHTML = App.renderHeader('마이페이지');
        document.getElementById('footer-wrap').innerHTML = App.renderFooter();

        /* ── 패널 전환 ── */
        function showPanel(name) {
            document.querySelectorAll('.my-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.side-nav a').forEach(a => a.classList.remove('active'));
            document.getElementById('panel-' + name).classList.add('active');
            document.getElementById('nav-' + name).classList.add('active');
            if (name === 'cert') renderEdu();
        }

        /* ── 약관 데이터 ── */
        const TERMS = [
            { id: 't1', label: '이용약관 동의', req: true, agreed: true, date: '2022-03-15' },
            { id: 't2', label: '개인정보 수집·이용 동의', req: true, agreed: true, date: '2022-03-15' },
            { id: 't3', label: '개인정보 제3자 제공 동의', req: false, agreed: false, date: null },
            { id: 't4', label: '마케팅 정보 수신 동의 (이메일)', req: false, agreed: true, date: '2023-01-10' },
            { id: 't5', label: '마케팅 정보 수신 동의 (SMS)', req: false, agreed: false, date: null },
        ];

        function renderTerms() {
            const el = document.getElementById('termsList');
            el.innerHTML = TERMS.map(t => `
    <div class="terms-item">
      <div class="terms-item-left">
        <input type="checkbox" class="terms-chk" id="${t.id}" ${t.agreed ? 'checked' : ''} ${t.req ? 'disabled' : ''}>
        <label for="${t.id}" class="terms-label" style="cursor:pointer;">${t.label}</label>
        <span class="${t.req ? 'terms-req' : 'terms-opt'}">${t.req ? '필수' : '선택'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        ${t.date ? `<span class="terms-date">동의일: ${t.date}</span>` : '<span class="terms-date">미동의</span>'}
        <span class="terms-view">내용 보기</span>
      </div>
    </div>
  `).join('');
        }
        renderTerms();

        /* ── 비밀번호 변경 ── */
        function changePw() {
            const cur = document.getElementById('pwCurrent').value.trim();
            const nw = document.getElementById('pwNew').value.trim();
            const cf = document.getElementById('pwConfirm').value.trim();
            const msg = document.getElementById('pwMsg');
            if (!cur || !nw || !cf) { msg.style.color = '#e17055'; msg.textContent = '모든 비밀번호 항목을 입력해주세요.'; return; }
            if (nw !== cf) { msg.style.color = '#e17055'; msg.textContent = '새 비밀번호가 일치하지 않습니다.'; return; }
            if (nw.length < 8) { msg.style.color = '#e17055'; msg.textContent = '비밀번호는 8자 이상이어야 합니다.'; return; }
            msg.style.color = '#2d6a4f';
            msg.textContent = '비밀번호가 변경되었습니다.';
            document.getElementById('pwCurrent').value = '';
            document.getElementById('pwNew').value = '';
            document.getElementById('pwConfirm').value = '';
        }

        /* ── 저장 ── */
        function saveInfo() { App.toast('회원정보가 저장되었습니다.'); }

        /* ── 탈퇴 모달 ── */
        function openWithdraw() { document.getElementById('withdrawModal').classList.add('open'); }
        function closeWithdraw() { document.getElementById('withdrawModal').classList.remove('open'); }
        function doWithdraw() {
            if (!document.getElementById('withdrawAgree').checked) { App.toast('탈퇴 동의 체크박스를 선택해주세요.'); return; }
            App.toast('탈퇴 처리 완료 (샘플)');
            closeWithdraw();
        }

        /* ── 교육이수 데이터 ── */
        const ALL_EDU = [
            { id: 1, title: '숲해설가 전문과정 1기', type: '전문과정', date: '2024-03-01', hours: 40, status: 'done', cert: true },
            { id: 2, title: '식물생태 심화 특강', type: '시민아카데미', date: '2024-05-10', hours: 8, status: 'done', cert: true },
            { id: 3, title: '숲치유 전문가 과정', type: '직무교육', date: '2024-07-20', hours: 16, status: 'done', cert: true },
            { id: 4, title: '생태 해설 기법 워크숍', type: '역량강화', date: '2024-09-05', hours: 8, status: 'done', cert: false },
            { id: 5, title: '산림교육 전문가 특강', type: '전문과정', date: '2024-11-01', hours: 24, status: 'done', cert: true },
            { id: 6, title: '조류 생태 관찰 실습', type: '시민아카데미', date: '2025-01-15', hours: 6, status: 'done', cert: false },
            { id: 7, title: '2025 숲해설 직무역량 강화', type: '직무교육', date: '2025-03-10', hours: 16, status: 'progress', cert: false },
            { id: 8, title: '곤충 생태계 해설 워크숍', type: '역량강화', date: '2025-04-01', hours: 8, status: 'applied', cert: false },
            { id: 9, title: '숲 환경 교육 지도사 과정', type: '전문과정', date: '2025-05-15', hours: 32, status: 'applied', cert: false },
            { id: 10, title: '맹그로브 해설 기법 특강', type: '시민아카데미', date: '2024-02-20', hours: 4, status: 'cancel', cert: false },
            { id: 11, title: '산림치유지도사 전문과정', type: '전문과정', date: '2023-09-01', hours: 40, status: 'done', cert: true },
            { id: 12, title: '식용식물 해설 실습', type: '역량강화', date: '2023-06-15', hours: 8, status: 'done', cert: false },
        ];

        const EDU_STATUS = {
            done: { label: '이수완료', cls: 'done' },
            progress: { label: '수강중', cls: 'progress' },
            applied: { label: '신청완료', cls: 'applied' },
            cancel: { label: '취소', cls: 'cancel' },
        };

        let eduFilter = 'all';
        let eduPage = 1;
        const EDU_PAGE_SIZE = 8;

        function filterEdu(type, btn) {
            eduFilter = type;
            eduPage = 1;
            document.querySelectorAll('.edu-tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderEduTable();
        }

        function renderEdu() {
            /* 통계 */
            document.getElementById('statTotal').textContent = ALL_EDU.length;
            document.getElementById('statDone').textContent = ALL_EDU.filter(e => e.status === 'done').length;
            document.getElementById('statProgress').textContent = ALL_EDU.filter(e => e.status === 'progress').length;
            document.getElementById('statApplied').textContent = ALL_EDU.filter(e => e.status === 'applied').length;
            renderEduTable();
        }

        function renderEduTable() {
            const filtered = eduFilter === 'all' ? ALL_EDU : ALL_EDU.filter(e => e.status === eduFilter);
            const total = filtered.length;
            const start = (eduPage - 1) * EDU_PAGE_SIZE;
            const rows = filtered.slice(start, start + EDU_PAGE_SIZE);
            const tbody = document.getElementById('eduTableBody');

            if (rows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:#b2bec3;">해당 내역이 없습니다.</td></tr>`;
            } else {
                tbody.innerHTML = rows.map((e, i) => {
                    const s = EDU_STATUS[e.status] || { label: e.status, cls: '' };
                    return `
        <tr>
          <td style="text-align:center;">${start + i + 1}</td>
          <td>${e.title}</td>
          <td class="edu-td-hide" style="text-align:center;">${e.type}</td>
          <td class="edu-td-hide" style="text-align:center;">${e.date}</td>
          <td style="text-align:center;">${e.hours}시간</td>
          <td style="text-align:center;"><span class="edu-badge ${s.cls}">${s.label}</span></td>
          <td style="text-align:center;">${e.cert ? `<button class="btn-cert" onclick="openCertModal(${e.id})">PDF</button>` : '-'}</td>
        </tr>`;
                }).join('');
            }

            /* 페이지네이션 */
            const totalPages = Math.ceil(total / EDU_PAGE_SIZE);
            const pg = document.getElementById('eduPagination');
            if (totalPages <= 1) { pg.innerHTML = ''; return; }
            let html = '';
            for (let p = 1; p <= totalPages; p++) {
                html += `<button class="edu-page-btn${p === eduPage ? ' active' : ''}" onclick="goEduPage(${p})">${p}</button>`;
            }
            pg.innerHTML = html;
        }

        function goEduPage(p) { eduPage = p; renderEduTable(); }

        /* ── 수료증 모달 ── */
        function openCertModal(id) {
            const e = ALL_EDU.find(x => x.id === id);
            if (!e) return;
            document.getElementById('certPreviewArea').innerHTML = `
    <div class="cert-preview">
      <div style="font-size:13px;color:#636e72;margin-bottom:4px;">한국숲해설가협회</div>
      <div class="cert-doc-title">수 료 증</div>
      <div class="cert-body">
        위 사람은 <strong>${e.title}</strong> 과정을<br>
        성실히 이수하였기에 이 증서를 드립니다.<br>
        이수시간: <strong>${e.hours}시간</strong>
      </div>
      <div style="font-size:13px;color:#636e72;margin-bottom:8px;">수료일: ${e.date}</div>
      <div style="font-size:14px;font-weight:700;color:#2d3436;">한국숲해설가협회장</div>
    </div>`;
            document.getElementById('certModal').classList.add('open');
        }

        /* ── 초기화 ── */
        showPanel('info');
    </script>
</body>

</html>
