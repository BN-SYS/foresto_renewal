<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멘토링 숲학교 | 한국숲해설가협회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.post-wrap {
  max-width: 860px;
  margin: 48px auto 80px;
  padding: 0 20px;
}

/* 포스트 헤드 */
.post-head {
  border-bottom: 2px solid var(--green-dark);
  padding-bottom: 20px;
  margin-bottom: 32px;
}
.post-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--gray-dark);
  line-height: 1.4;
  margin: 0 0 16px;
}
.post-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  font-size: 14px;
  color: var(--gray-mid);
}
.post-meta span strong {
  color: var(--gray-dark);
  font-weight: 600;
}

/* 포스트 바디 */
.post-body {
  font-size: 15px;
  line-height: 1.9;
  color: var(--gray-dark);
  min-height: 200px;
  margin-bottom: 48px;
  padding-bottom: 40px;
  border-bottom: 1px solid var(--gray-light);
}
.post-body p { margin: 0 0 16px; }
.post-body img { max-width: 100%; border-radius: var(--radius); margin: 16px 0; }

/* 이전/다음 네비 */
.post-nav {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 32px;
  border: 1px solid var(--gray-light);
  border-radius: var(--radius);
  overflow: hidden;
}
.post-nav-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  font-size: 14px;
  color: var(--gray-dark);
  text-decoration: none;
  border-bottom: 1px solid var(--gray-light);
  transition: background .15s;
}
.post-nav-item:last-child { border-bottom: none; }
.post-nav-item:hover { background: var(--gray-bg); }
.post-nav-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray-mid);
  min-width: 36px;
  flex-shrink: 0;
}
.post-nav-title { flex: 1; }
.post-nav-none {
  padding: 14px 20px;
  font-size: 14px;
  color: var(--gray-mid);
  border-bottom: 1px solid var(--gray-light);
  display: flex;
  align-items: center;
  gap: 16px;
}
.post-nav-none:last-child { border-bottom: none; }

/* 액션 버튼 */
.post-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
}

@media (max-width: 768px) {
  .post-wrap { margin: 32px auto 60px; }
  .post-title { font-size: 18px; }
  .post-meta { gap: 12px; font-size: 13px; }
}
</style>
</head>
<body>
<div id="header-wrap"></div>

<div class="page-header">
  <div class="container">
    <h1>멘토링 숲학교</h1>
    <p>정회원을 위한 멘토링 소식 게시판입니다.</p>
  </div>
</div>

<div class="sub-nav">
  <div class="sub-nav-inner">
    <a href="course-competency.html" class="sub-nav-item">역량강화 교육강좌</a>
    <a href="member-mentoring.html"  class="sub-nav-item active">멘토링 숲학교</a>
    <a href="member-recruit.html"    class="sub-nav-item">수시숲해설 모집</a>
    <a href="member-instructor.html" class="sub-nav-item">숲해설 강사 신청</a>
    <a href="member-sagongdan.html"  class="sub-nav-item">사공단 소식</a>
    <a href="member-club.html"       class="sub-nav-item">동아리 소식</a>
  </div>
</div>

<main>
  <div class="post-wrap">

    <div class="post-head">
      <h1 class="post-title" id="postTitle">-</h1>
      <div class="post-meta">
        <span><strong>작성자</strong> <span id="postAuthor">-</span></span>
        <span><strong>작성일</strong> <span id="postDate">-</span></span>
        <span><strong>조회</strong>   <span id="postViews">-</span></span>
      </div>
    </div>

    <div class="post-body" id="postBody"></div>

    <!-- 이전 / 다음 -->
    <div class="post-nav" id="postNav"></div>

    <div class="post-actions">
      <a href="member-mentoring.html" class="btn btn-outline">목록으로</a>
    </div>

  </div>
</main>

<div id="footer-wrap"></div>
<script src="common.js"></script>
<script>
document.getElementById('header-wrap').innerHTML = App.renderHeader('회원활동');
document.getElementById('footer-wrap').innerHTML = App.renderFooter();

/* ── 샘플 데이터 (목록과 동일하게 유지) ── */
const ALL_POSTS = [
  { id: 9001, isNotice: true,  title: '[공지] 2026년 멘토링 숲학교 운영 안내',
    author: '관리자', date: '2026-01-02', views: 320,
    body: `<p>2026년 멘토링 숲학교 운영 일정을 안내드립니다.</p>
           <p>• 운영 기간: 2026년 3월 ~ 11월<br>
              • 대상: 정회원 (가입 1년 이상)<br>
              • 신청: 각 기수 모집 공고 참고</p>
           <p>자세한 문의는 협회 사무국(02-000-0000)으로 연락 주세요.</p>` },
  { id: 9002, isNotice: true,  title: '[공지] 멘토링 프로그램 참여 자격 안내',
    author: '관리자', date: '2026-01-01', views: 215,
    body: `<p>멘토링 프로그램 참여 자격을 안내드립니다.</p>
           <p>• 멘티: 준회원 이상<br>
              • 멘토: 정회원 (활동 경력 2년 이상 권장)</p>` },
  ...Array.from({ length: 38 }, (_, i) => ({
    id: 38 - i,
    isNotice: false,
    title: [
      '3월 멘토링 숲학교 후기를 공유합니다',
      '멘토링 일정 변경 안내 (4월)',
      '처음 멘토링에 참여했습니다 — 느낀 점',
      '숲 해설 멘토님께 감사 인사드립니다',
      '멘토링 숲학교 2기 모집 공고',
      '멘토링 활동 사진 공유합니다',
      '5월 야외 멘토링 장소 안내',
    ][i % 7],
    author: ['김회원', '이정회', '박숲길', '최나무', '정초록'][i % 5],
    date: `2026-${String(Math.floor(i / 4) + 1).padStart(2,'0')}-${String((i % 28) + 1).padStart(2,'0')}`,
    views: Math.floor(Math.random() * 200) + 10,
    body: `<p>멘토링 숲학교 활동 내용을 공유합니다.</p>
           <p>이번 모임에서는 봄철 숲 해설 실습과 피드백 세션이 진행되었습니다.<br>
              참여해주신 모든 분들께 감사드립니다.</p>`,
  })),
];

/* ── URL 파라미터로 게시글 선택 ── */
const params  = new URLSearchParams(location.search);
const postId  = parseInt(params.get('id')) || ALL_POSTS[0].id;
const postIdx = ALL_POSTS.findIndex(p => p.id === postId);
const post    = ALL_POSTS[postIdx];

if (post) {
  document.title = `${post.title} | 한국숲해설가협회`;

  document.getElementById('postTitle').textContent  = post.title;
  document.getElementById('postAuthor').textContent = post.author;
  document.getElementById('postDate').textContent   = post.date;
  document.getElementById('postViews').textContent  = post.views;
  document.getElementById('postBody').innerHTML     = post.body ||
    '<p style="color:var(--gray-mid)">내용이 없습니다.</p>';

  /* 이전 / 다음 (배열 순서 기준) */
  const prev = ALL_POSTS[postIdx - 1];
  const next = ALL_POSTS[postIdx + 1];

  const prevHtml = prev
    ? `<a class="post-nav-item" href="member-mentoring-detail.html?id=${prev.id}">
         <span class="post-nav-label">이전</span>
         <span class="post-nav-title">${prev.title}</span>
       </a>`
    : `<div class="post-nav-none">
         <span class="post-nav-label">이전</span>
         <span style="color:var(--gray-mid)">이전 글이 없습니다.</span>
       </div>`;

  const nextHtml = next
    ? `<a class="post-nav-item" href="member-mentoring-detail.html?id=${next.id}">
         <span class="post-nav-label">다음</span>
         <span class="post-nav-title">${next.title}</span>
       </a>`
    : `<div class="post-nav-none">
         <span class="post-nav-label">다음</span>
         <span style="color:var(--gray-mid)">다음 글이 없습니다.</span>
       </div>`;

  document.getElementById('postNav').innerHTML = prevHtml + nextHtml;
}
</script>
</body>
</html>
