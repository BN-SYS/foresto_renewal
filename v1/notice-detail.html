<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 상세 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    /* ── 페이지 헤더 */
    .page-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green-main));
      color: #fff;
      padding: 36px 0;
    }
    .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-header p  { font-size: 14px; opacity: .8; }

    /* ── 게시물 래퍼 */
    .post-wrap {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── 게시물 헤더 */
    .post-head {
      padding: 24px 28px;
      border-bottom: 2px solid var(--green-pale);
    }
    .post-head h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .post-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--gray-mid);
    }
    .post-meta span strong { color: var(--gray-dark); margin-left: 4px; }

    /* ── 게시물 본문 */
    .post-body {
      padding: 32px 28px;
      font-size: 15px;
      line-height: 1.9;
      color: var(--gray-dark);
      min-height: 240px;
      border-bottom: 1px solid var(--gray-light);
    }
    .post-body p   { margin-bottom: 14px; }
    .post-body strong { color: var(--green-dark); }

    /* ── 첨부파일 */
    .post-attach {
      padding: 16px 28px;
      border-bottom: 1px solid var(--gray-light);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .post-attach .attach-label {
      font-weight: 700;
      color: var(--gray-dark);
      flex-shrink: 0;
    }
    .attach-file {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--gray-bg);
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      color: var(--green-dark);
      font-size: 13px;
      cursor: pointer;
      transition: var(--trans);
      text-decoration: none;
    }
    .attach-file:hover {
      background: var(--green-pale);
      border-color: var(--green-main);
    }

    /* ── 이전/다음 글 */
    .post-nav {
      border-top: 1px solid var(--gray-light);
    }
    .post-nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 13px 28px;
      font-size: 14px;
      border-bottom: 1px solid var(--gray-light);
      cursor: pointer;
      transition: var(--trans);
    }
    .post-nav-item:last-child { border-bottom: none; }
    .post-nav-item:hover      { background: var(--gray-bg); }
    .post-nav-label {
      width: 48px;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-mid);
    }
    .post-nav-title {
      flex: 1;
      color: var(--gray-dark);
    }
    .post-nav-title:hover { color: var(--green-main); }
    .post-nav-date {
      font-size: 12px;
      color: var(--gray-mid);
      white-space: nowrap;
    }

    /* ── 하단 버튼 */
    .post-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div id="hdr"></div>

<!-- 페이지 헤더 -->
<div class="page-header">
  <div class="container">
    <h1>공지사항</h1>
    <p>협회의 공지 및 주요 안내사항을 확인하세요.</p>
  </div>
</div>

<main class="section">
  <div class="container">
    <div class="post-wrap">

      <!-- 게시물 헤더 -->
      <div class="post-head">
        <h2 id="postTitle"></h2>
        <div class="post-meta">
          <span>작성자 <strong id="postAuthor"></strong></span>
          <span>작성일 <strong id="postDate"></strong></span>
          <span>조회수 <strong id="postViews"></strong></span>
        </div>
      </div>

      <!-- 게시물 본문 -->
      <div class="post-body" id="postBody"></div>

      <!-- 첨부파일 -->
      <div class="post-attach" id="postAttach"></div>

      <!-- 이전/다음 글 -->
      <div class="post-nav" id="postNav"></div>

    </div><!-- /post-wrap -->

    <!-- 하단 버튼 -->
    <div class="post-actions">
      <button class="btn btn-gray"
              onclick="location.href='notice-list.html'">목록으로</button>
      <button class="btn btn-primary" id="btnEdit"
              onclick="App.toast('수정 기능은 관리자 페이지에서 지원합니다.')">수정</button>
      <button class="btn btn-danger"  id="btnDel"
              onclick="App.toast('삭제 기능은 관리자 페이지에서 지원합니다.')">삭제</button>
    </div>

  </div>
</main>

<div id="ftr"></div>

<script src="common.js"></script>
<script>
  document.getElementById('hdr').innerHTML = App.renderHeader('커뮤니티');
  document.getElementById('ftr').innerHTML = App.renderFooter();

  /* ── 샘플 데이터 */
  const DATA = [
    { id:20, pin:true,  title:'[필독] 2026년 개인정보 처리방침 개정 안내',
      author:'관리자', date:'2026.03.08', views:312,
      body:`<p>안녕하세요, 한국숲해설가협회입니다.</p>
            <p>2026년 3월 8일부터 개인정보 처리방침이 일부 개정됩니다.<br>
            주요 변경사항은 아래와 같습니다.</p>
            <p><strong>변경 항목</strong><br>
            1. 개인정보 보유기간 명확화<br>
            2. 제3자 제공 항목 일부 조정<br>
            3. 열람·정정·삭제 요청 절차 간소화</p>
            <p>자세한 내용은 홈페이지 하단 개인정보취급방침에서 확인하시기 바랍니다.<br>
            문의사항은 사무국(02-000-0000)으로 연락 주시기 바랍니다.</p>
            <p>감사합니다.</p>`,
      files:['개인정보처리방침_2026_개정안.pdf']
    },
    { id:18, pin:false, title:'55기 전문가과정 모집 안내',
      author:'관리자', date:'2026.03.08', views:187,
      body:`<p>안녕하세요, 한국숲해설가협회입니다.</p>
            <p>2026년 55기 숲해설가 전문가과정 수강생을 모집합니다.</p>
            <p><strong>교육 개요</strong><br>
            - 교육명: 제55기 숲해설가 전문가과정<br>
            - 교육기간: 2026.04.01 ~ 2026.06.30 (3개월)<br>
            - 접수기간: 2026.03.01 ~ 2026.03.20<br>
            - 교육장소: 서울숲 교육관<br>
            - 정원: 30명 (선착순 마감)</p>
            <p><strong>지원 자격</strong><br>
            - 만 18세 이상 성인 누구나<br>
            - 자연 및 숲에 관심 있는 분</p>
            <p><strong>수료 후 혜택</strong><br>
            - 수료증 발급<br>
            - 협회 정회원 자격 취득 기회<br>
            - 현장 활동 연계 지원</p>
            <p>많은 관심과 참여 바랍니다.</p>`,
      files:['55기_전문가과정_모집안내.pdf', '신청서양식.hwp']
    },
    { id:17, pin:false, title:'[긴급] 3월 이사회 일정 변경',
      author:'관리자', date:'2026.03.05', views:134,
      body:`<p>안녕하세요, 한국숲해설가협회입니다.</p>
            <p>부득이한 사정으로 3월 이사회 일정이 아래와 같이 변경되었습니다.</p>
            <p><strong>변경 전</strong>: 2026년 3월 10일 (화) 오후 2시<br>
            <strong>변경 후</strong>: 2026년 3월 17일 (화) 오후 2시</p>
            <p>장소는 동일합니다 (협회 회의실).<br>
            이사진께서는 일정 변경에 참고하시기 바랍니다.</p>
            <p>문의: 사무국 02-000-0000</p>`,
      files:[]
    },
  ];

  /* URL 파라미터에서 id 파싱 */
  const params = new URLSearchParams(location.search);
  const id     = parseInt(params.get('id')) || DATA[0].id;
  const idx    = DATA.findIndex(d => d.id === id);
  const post   = DATA[idx] ?? DATA[0];

  /* 본문 렌더 */
  document.getElementById('postTitle').textContent  = post.title;
  document.getElementById('postAuthor').textContent = post.author;
  document.getElementById('postDate').textContent   = post.date;
  document.getElementById('postViews').textContent  = post.views + '회';
  document.getElementById('postBody').innerHTML     = post.body;

  /* 첨부파일 */
  const attachEl = document.getElementById('postAttach');
  if (post.files && post.files.length > 0) {
    attachEl.innerHTML = `
      <span class="attach-label">첨부파일</span>
      ${post.files.map(f =>
        `<a class="attach-file" href="#" onclick="App.toast('${f} 다운로드')">
           ${f}
         </a>`).join('')}`;
  } else {
    attachEl.style.display = 'none';
  }

  /* 이전/다음 글 */
  const prev = DATA[idx - 1] ?? null;
  const next = DATA[idx + 1] ?? null;
  document.getElementById('postNav').innerHTML = `
    ${prev ? `
    <div class="post-nav-item"
         onclick="location.href='notice-detail.html?id=${prev.id}'">
      <span class="post-nav-label">이전 글</span>
      <span class="post-nav-title">${prev.title}</span>
      <span class="post-nav-date">${prev.date}</span>
    </div>` : `
    <div class="post-nav-item" style="color:var(--gray-mid);cursor:default">
      <span class="post-nav-label">이전 글</span>
      <span class="post-nav-title">이전 글이 없습니다.</span>
    </div>`}
    ${next ? `
    <div class="post-nav-item"
         onclick="location.href='notice-detail.html?id=${next.id}'">
      <span class="post-nav-label">다음 글</span>
      <span class="post-nav-title">${next.title}</span>
      <span class="post-nav-date">${next.date}</span>
    </div>` : `
    <div class="post-nav-item" style="color:var(--gray-mid);cursor:default">
      <span class="post-nav-label">다음 글</span>
      <span class="post-nav-title">다음 글이 없습니다.</span>
    </div>`}`;

  /* 관리자 아닌 경우 수정/삭제 버튼 숨김 */
  if (App.user.role !== 'admin') {
    document.getElementById('btnEdit').style.display = 'none';
    document.getElementById('btnDel').style.display  = 'none';
  }
</script>
</body>
</html>
