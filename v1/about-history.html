<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연혁 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>

    .content-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 24px 88px;
    }

    /* ── 연도 그룹 */
    .history-wrap {
      position: relative;
      padding-left: 32px;
    }
    /* 세로 타임라인 선 */
    .history-wrap::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--green-pale);
    }

    .history-group {
      position: relative;
      margin-bottom: 48px;
    }
    .history-group:last-child { margin-bottom: 0; }

    /* 연도 뱃지 */
    .history-year {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    /* 타임라인 점 */
    .history-year::before {
      content: '';
      position: absolute;
      left: -38px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green-main);
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px var(--green-main);
    }
    .history-group.major .history-year::before {
      width: 16px;
      height: 16px;
      left: -40px;
      background: var(--green-dark);
      box-shadow: 0 0 0 3px var(--green-dark);
    }

    .year-num {
      font-size: 20px;
      font-weight: 800;
      color: var(--green-dark);
    }
    .history-group.major .year-num {
      font-size: 22px;
    }
    .year-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--green-dark);
      color: #fff;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* 항목 리스트 */
    .history-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-left: 4px;
    }
    .history-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      font-size: 14px;
      color: var(--gray-dark);
      line-height: 1.7;
    }
    .history-month {
      width: 36px;
      flex-shrink: 0;
      font-weight: 700;
      color: var(--green-main);
      font-size: 13px;
      padding-top: 1px;
    }
    .history-text { flex: 1; word-break: keep-all; }
    .history-text strong { color: var(--green-dark); }

    /* ── 반응형 */
    @media (max-width: 480px) {
      .history-wrap  { padding-left: 24px; }
      .history-year::before { left: -30px; }
      .history-group.major .history-year::before { left: -32px; }
      .content-wrap  { padding: 36px 16px 60px; }
    }
  </style>
</head>
<body>

<div id="hdr"></div>

<div class="page-header">
  <div class="container">
    <h1>협회 소개</h1>
    <p>한국숲해설가협회를 소개합니다.</p>

<div class="sub-nav">

      <div class="history-year">
        <span class="year-num">${g.year}</span>

      </div>
      <div class="history-items">
        ${g.items.map(item => `
          <div class="history-item">

</body>
