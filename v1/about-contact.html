  <style>

    .content-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 56px 24px 88px;
    }

    /* ── 2단 레이아웃 */
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 32px;
      align-items: start;
    }

    /* ── 지도 영역 */
    .map-wrap {
      background: var(--gray-light);
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 4 / 3;
      position: relative;
    }
    /* 카카오맵 iframe */
    .map-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /* iframe 로드 전 placeholder */
    .map-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #e8eeeb;
      color: var(--gray-mid);
      font-size: 14px;
    }
    .map-placeholder svg {
      width: 48px; height: 48px; opacity: .4;
    }

    /* ── 정보 카드 */
    .info-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .info-card-head {
      background: var(--green-dark);
      color: #fff;
      padding: 20px 24px;
    }
    .info-card-head h3 {
      font-size: 16px; font-weight: 700; margin-bottom: 3px;
    }
    .info-card-head p {
      font-size: 13px; opacity: .8;
    }
    .info-card-body { padding: 4px 0; }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--gray-light);
    }
    .info-row:last-child { border-bottom: none; }

    .info-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--green-pale);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .info-icon svg { width: 18px; height: 18px; }

    .info-content { flex: 1; }
    .info-label {
      font-size: 11px; font-weight: 700;
      color: var(--gray-mid); letter-spacing: .5px;
      text-transform: uppercase; margin-bottom: 3px;
    }
    .info-value {
      font-size: 14px; color: var(--gray-dark);
      line-height: 1.65; font-weight: 500;
      word-break: keep-all;
    }
    .info-value a {
      color: var(--green-main);
      text-decoration: none;
    }
    .info-value a:hover { text-decoration: underline; }

    /* ── 교통편 섹션 */
    .transport-section { margin-top: 40px; }
    .transport-title {
      font-size: 16px; font-weight: 700;
      color: var(--green-dark); margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--green-pale);
    }
    .transport-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .transport-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .transport-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .transport-badge {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px; font-weight: 700;
      color: #fff;
    }
    .badge-subway { background: #2563eb; }
    .badge-bus    { background: #16a34a; }
    .badge-car    { background: #9333ea; }
    .badge-park   { background: var(--gray-mid); }

    .transport-name {
      font-size: 14px; font-weight: 700; color: var(--gray-dark);
    }
    .transport-items {
      display: flex; flex-direction: column; gap: 6px;
    }
    .transport-item {
      font-size: 13px; color: var(--gray-dark);
      line-height: 1.6; word-break: keep-all;
      display: flex; gap: 6px; align-items: flex-start;
    }
    .transport-item::before {
      content: '·';
      color: var(--gray-mid);
      flex-shrink: 0;
    }

    /* ── 반응형 */
    @media (max-width: 1024px) {
      .contact-layout { grid-template-columns: 1fr; }
      .map-wrap       { aspect-ratio: 16 / 9; }
    }
    @media (max-width: 600px) {
      .transport-grid { grid-template-columns: 1fr; }
      .content-wrap   { padding: 36px 16px 60px; }
    }
  </style>
</head>
