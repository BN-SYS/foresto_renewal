<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전문과정 신청 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="courses-modal.css">
</head>

<body>
  <div id="header-wrap"></div>

  <div class="page-header">
    <div class="container">
      <h1>전문과정 신청</h1>
      <p>전문가 과정에 참여하세요.</p>
    </div>
  </div>

  <!-- 서브 탭 내비 -->
  <div class="sub-nav">
    <div class="sub-nav-inner">
      <a href="about-forester.html" class="sub-nav-item">숲해설가란</a>
      <a href="faq.html" class="sub-nav-item">자주 묻는 질문</a>
      <a href="course-intro.html" class="sub-nav-item">전문과정 안내</a>
      <a href="course-list.html" class="sub-nav-item active">전문과정 신청</a>
      <a href="course-academy.html" class="sub-nav-item">시민아카데미</a>
      <a href="course-job.html" class="sub-nav-item">직무교육</a>
    </div>
  </div>

  <main class="container section">
    <div class="search-wrap">
      <div class="search-field">
        <label>접수상태</label>
        <select class="form-control" id="filterStatus">
          <option value="">전체</option>
          <option value="open">접수중</option>
          <option value="ready">접수예정</option>
          <option value="closed">접수마감</option>
          <option value="cancel">신청취소</option>
          <option value="done">수강완료</option>
        </select>
      </div>
      <div class="search-field">
        <label>일자</label>
        <div class="date-range">
          <input type="date" class="form-control" id="dateFrom">
          <span>~</span>
          <input type="date" class="form-control" id="dateTo">
        </div>
      </div>
      <button class="btn btn-primary search-btn" onclick="doSearch()">검색하기</button>
    </div>

    <div class="list-top">
      <div class="list-count">목록 <strong id="totalCount">0</strong>건</div>
      <select class="form-control" id="pageSizeSelect" onchange="changePageSize()"
        style="padding:0 28px 0 12px; height:36px; line-height:36px; font-size:12px; width:130px; flex-shrink:0; box-sizing:border-box;">
        <option value="10">10개씩 보기</option>
        <option value="20">20개씩 보기</option>
        <option value="50">50개씩 보기</option>
      </select>
    </div>

    <table class="course-table">
      <thead>
        <tr>
          <th style="width:60px;">NO.</th>
          <th>강좌명</th>
          <th style="width:130px;">일자</th>
          <th style="width:260px;">접수 기간</th>
          <th style="width:100px;">접수상태</th>
        </tr>
      </thead>
      <tbody id="courseTableBody"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </main>

  <div id="footer-wrap"></div>
  <script src="common.js"></script>
  <script>
    document.getElementById('header-wrap').innerHTML = App.renderHeader('숲해설가교육');
    document.getElementById('footer-wrap').innerHTML = App.renderFooter();
  </script>
  <script>const PAGE_TYPE = '전문과정';</script>
  <script src="courses-data.js"></script>
</body>

</html>
