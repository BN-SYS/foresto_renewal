<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지역협회 상세 | 한국숲해설가협회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.post-wrap {
  background: #fff;
  border: 1px solid var(--gray-light);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.post-head {
  padding: 24px 28px;
  border-bottom: 2px solid var(--green-pale);
}
.post-head h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--gray-dark);
  margin-bottom: 10px;
  line-height: 1.4;
}
.post-meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--gray-mid);
  flex-wrap: wrap;
}
.post-meta strong {
  color: var(--gray-dark);
}

/* 썸네일 영역 */
.post-thumb {
  width: 100%;
  background: var(--green-pale);
  overflow: hidden;
  border-bottom: 1px solid var(--gray-light);
  aspect-ratio: 16 / 7;
  display: flex;
  align-items: center;
  justify-content: center;
}
.post-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.post-thumb-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--green-pale);
}

.post-body {
  padding: 32px 28px;
  min-height: 200px;
  border-bottom: 1px solid var(--gray-light);
  font-size: 15px;
  line-height: 1.9;
  color: var(--gray-dark);
}
.post-body p { margin-bottom: 12px; }
.post-body a {
  color: var(--green-main);
  text-decoration: underline;
  font-weight: 600;
}
.post-body a:hover { color: var(--green-dark); }
.post-body img {
  max-width: 100%;
  border-radius: var(--radius);
  margin: 12px 0;
}
.post-body ul, .post-body ol {
  padding-left: 20px;
  margin-bottom: 12px;
}
.post-body li { margin-bottom: 6px; }
.post-body h3, .post-body h4 {
  font-weight: 700;
  margin: 20px 0 8px;
  color: var(--green-dark);
}

/* 이전/다음 글 네비 */
.post-nav { border-top: 1px solid var(--gray-light); }
.post-nav-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 13px 28px;
  border-bottom: 1px solid var(--gray-light);
  cursor: pointer;
  transition: var(--trans);
  font-size: 14px;
}
.post-nav-item:last-child { border-bottom: none; }
.post-nav-item:hover { background: var(--gray-bg); }
.post-nav-label {
  width: 60px;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 700;
  color: var(--green-dark);
}
.post-nav-title {
  flex: 1;
  color: var(--gray-dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.post-nav-date {
  font-size: 12px;
  color: var(--gray-mid);
  flex-shrink: 0;
}

/* 하단 버튼 */
.post-actions {
  display: flex;
  justify-content: center;
  margin-top: 24px;
}

@media (max-width: 768px) {
  .post-head { padding: 18px 16px; }
  .post-body { padding: 20px 16px; }
  .post-nav-item { padding: 12px 16px; }
  .post-thumb { aspect-ratio: 16 / 9; }
}
</style>
</head>
<body>
<div id="hdr"></div>

<div class="page-header">
  <div class="container">
    <h1>전국 지역협회</h1>
    <p>한국숲해설가협회의 전국 지역협회를 소개합니다.</p>
  </div>
</div>

<div class="sub-nav">
  <div class="sub-nav-inner">
    <a href="about.html" class="sub-nav-item">인사말</a>
    <a href="about-vision.html" class="sub-nav-item">미션&amp;비전</a>
    <a href="about-project.html" class="sub-nav-item">주요사업</a>
    <a href="about-history.html" class="sub-nav-item">연혁</a>
    <a href="about-members.html" class="sub-nav-item">조직도&amp;임원진</a>
    <a href="about-regions.html" class="sub-nav-item active">전국 지역협회</a>
    <a href="about-constitution.html" class="sub-nav-item">정관</a>
    <a href="about-contact.html" class="sub-nav-item">오시는길</a>
  </div>
</div>

<main class="section">
  <div class="container">
    <div class="content-wrap">
      <div class="post-wrap">
        <div class="post-head">
          <h2 id="postTitle"></h2>
          <div class="post-meta">
            <span>활동 지역 <strong id="postArea"></strong></span>
            <span>대표자 <strong id="postRep"></strong></span>
          </div>
        </div>
        <div class="post-thumb" id="postThumb"></div>
        <div class="post-body" id="postBody"></div>
        <div class="post-nav" id="postNav"></div>
      </div>
      <div class="post-actions">
        <button class="btn btn-gray" onclick="location.href='about-regions.html'">목록으로</button>
      </div>
    </div>
  </div>
</main>

<div id="ftr"></div>
<script src="common.js"></script>
<script>
document.getElementById('hdr').innerHTML = App.renderHeader('협회소개');
document.getElementById('ftr').innerHTML = App.renderFooter();

/* placeholder SVG 공통 */
const placeholderHtml = `
  <div class="post-thumb-placeholder">
    <svg viewBox="0 0 160 90" fill="none" xmlns="http://www.w3.org/2000/svg"
         style="width:120px; height:auto; opacity:0.6;">
      <rect x="8" y="8" width="144" height="74" rx="4" stroke="#aac8a8" stroke-width="3"/>
      <circle cx="50" cy="35" r="12" stroke="#aac8a8" stroke-width="3"/>
      <path d="M8 82 L50 48 L80 68 L108 45 L152 82"
            stroke="#aac8a8" stroke-width="3" stroke-linejoin="round"/>
    </svg>
  </div>`;

const REGIONS = [
  { id:1,  title:'서울특별시 지역협회',     rep:'홍길동', area:'서울 전역', date:'2026.01.01',
    thumb: 'images/regions/seoul.jpg',
    body:`<p>서울 지역의 숲해설 활동을 이끌어가는 협회입니다.</p><p>북한산, 관악산, 청계산 등 서울 도심 속 숲에서 다양한 생태 교육 프로그램을 운영합니다.</p><p>홈페이지: <a href="https://example.com/seoul" target="_blank" rel="noopener">서울 지역협회 바로가기</a></p>`},
  { id:2,  title:'경기도 지역협회',         rep:'이숲해', area:'경기 전역', date:'2026.01.01',
    thumb: 'images/regions/gyeonggi.jpg',
    body:`<p>경기도 전역의 숲 교육 및 치유 프로그램을 운영합니다.</p><p>광릉수목원, 용문산, 청평 등 경기 지역의 주요 산림에서 활동하고 있습니다.</p><p>홈페이지: <a href="https://example.com/gyeonggi" target="_blank" rel="noopener">경기 지역협회 바로가기</a></p>`},
  { id:3,  title:'인천광역시 지역협회',     rep:'박초록', area:'인천 전역', date:'2026.01.01',
    thumb: 'images/regions/incheon.jpg',
    body:`<p>인천 지역 숲 생태 해설 활동을 담당합니다.</p><p>계양산, 문학산, 인천 도시숲 등에서 활발히 활동 중입니다.</p>`},
  { id:4,  title:'강원특별자치도 지역협회', rep:'최산림', area:'강원 전역', date:'2026.01.01',
    thumb: 'images/regions/gangwon.jpg',
    body:`<p>강원도의 국립공원 및 자연휴양림 중심 해설 프로그램을 운영합니다.</p><p>설악산, 오대산, 치악산 등 강원의 대표 산림에서 활동합니다.</p><p>홈페이지: <a href="https://example.com/gangwon" target="_blank" rel="noopener">강원 지역협회 바로가기</a></p>`},
  { id:5,  title:'충청북도 지역협회',       rep:'정나무', area:'충북 전역', date:'2026.01.01',
    thumb: 'images/regions/chungbuk.jpg',
    body:`<p>충청북도 지역의 산림교육 및 환경 프로그램을 운영합니다.</p><p>속리산, 월악산 등 충북의 주요 산림을 중심으로 활동합니다.</p>`},
  { id:6,  title:'충청남도 지역협회',       rep:'한바람', area:'충남 전역', date:'2026.01.01',
    thumb: 'images/regions/chungnam.jpg',
    body:`<p>충남의 해안 및 내륙 숲 생태계 해설 활동을 이끕니다.</p><p>태안해안국립공원, 계룡산 등에서 다양한 프로그램을 운영합니다.</p><p>홈페이지: <a href="https://example.com/chungnam" target="_blank" rel="noopener">충남 지역협회 바로가기</a></p>`},
  { id:7,  title:'전북특별자치도 지역협회', rep:'윤들판', area:'전북 전역', date:'2026.01.01',
    thumb: 'images/regions/jeonbuk.jpg',
    body:`<p>전북 지역 생태 문화 연계 숲 교육 프로그램을 운영합니다.</p><p>덕유산, 내장산, 변산반도 등에서 활동합니다.</p>`},
  { id:8,  title:'전라남도 지역협회',       rep:'임해설', area:'전남 전역', date:'2026.01.01',
    thumb: 'images/regions/jeonnam.jpg',
    body:`<p>전남 도서·해안 생태계 및 산림 교육을 담당합니다.</p><p>지리산, 다도해해상국립공원 등에서 활발히 활동 중입니다.</p><p>홈페이지: <a href="https://example.com/jeonnam" target="_blank" rel="noopener">전남 지역협회 바로가기</a></p>`},
  { id:9,  title:'경상북도 지역협회',       rep:'조푸름', area:'경북 전역', date:'2026.01.01',
    thumb: 'images/regions/gyeongbuk.jpg',
    body:`<p>경북 지역의 역사·문화 숲 해설 프로그램을 운영합니다.</p><p>주왕산, 소백산, 팔공산 등 경북의 주요 산림에서 활동합니다.</p>`},
  { id:10, title:'경상남도 지역협회',       rep:'권생태', area:'경남 전역', date:'2026.01.01',
    thumb: 'images/regions/gyeongnam.jpg',
    body:`<p>경남 지역의 생태 해설 및 산림 치유 프로그램을 담당합니다.</p><p>지리산(경남), 가야산, 남해 등에서 활동합니다.</p><p>홈페이지: <a href="https://example.com/gyeongnam" target="_blank" rel="noopener">경남 지역협회 바로가기</a></p>`},
  { id:11, title:'부산광역시 지역협회',     rep:'문바다', area:'부산 전역', date:'2026.01.01',
    thumb: 'images/regions/busan.jpg',
    body:`<p>부산의 해안과 도심 숲 교육 프로그램을 운영합니다.</p><p>금정산, 태종대, 을숙도 생태공원 등을 중심으로 활동합니다.</p>`},
  { id:12, title:'제주특별자치도 지역협회', rep:'고한라', area:'제주 전역', date:'2026.01.01',
    thumb: 'images/regions/jeju.jpg',
    body:`<p>제주 고유 생태계와 곶자왈 해설 프로그램을 전문으로 합니다.</p><p>한라산, 곶자왈, 오름 등 제주 특유의 생태환경에서 활동합니다.</p><p>홈페이지: <a href="https://example.com/jeju" target="_blank" rel="noopener">제주 지역협회 바로가기</a></p>`},
];

const params = new URLSearchParams(location.search);
const id = parseInt(params.get('id')) || 1;
const idx = REGIONS.findIndex(r => r.id === id);
const region = REGIONS[idx] ?? REGIONS[0];

/* 타이틀·메타 렌더링 */
document.title = `${region.title} | 한국숲해설가협회`;
document.getElementById('postTitle').textContent = region.title;
document.getElementById('postArea').textContent = region.area;
document.getElementById('postRep').textContent = region.rep;

/* 썸네일 렌더링 – 이미지 로드 실패 시 SVG placeholder 폴백 */
const thumbEl = document.getElementById('postThumb');
if (region.thumb) {
  const img = document.createElement('img');
  img.src = region.thumb;
  img.alt = region.title;
  img.onerror = function () {
    thumbEl.innerHTML = placeholderHtml;
  };
  thumbEl.appendChild(img);
} else {
  thumbEl.innerHTML = placeholderHtml;
}

/* 에디터 본문 그대로 렌더링 */
document.getElementById('postBody').innerHTML = region.body;

/* 이전/다음 글 */
const prev = REGIONS[idx - 1] || null;
const next = REGIONS[idx + 1] || null;

document.getElementById('postNav').innerHTML = `
  ${prev
    ? `<div class="post-nav-item" onclick="location.href='about-regions-detail.html?id=${prev.id}'">
         <span class="post-nav-label">이전 글</span>
         <span class="post-nav-title">${prev.title}</span>
         <span class="post-nav-date">${prev.date}</span>
       </div>`
    : `<div class="post-nav-item" style="cursor:default;color:var(--gray-mid)">
         <span class="post-nav-label">이전 글</span>
         <span class="post-nav-title">이전 글이 없습니다.</span>
       </div>`
  }
  ${next
    ? `<div class="post-nav-item" onclick="location.href='about-regions-detail.html?id=${next.id}'">
         <span class="post-nav-label">다음 글</span>
         <span class="post-nav-title">${next.title}</span>
         <span class="post-nav-date">${next.date}</span>
       </div>`
    : `<div class="post-nav-item" style="cursor:default;color:var(--gray-mid)">
         <span class="post-nav-label">다음 글</span>
         <span class="post-nav-title">다음 글이 없습니다.</span>
       </div>`
  }
`;
</script>
</body>
</html>
