<style>
/* 갤러리 그리드 */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 8px;
}
.gallery-card {
  background: #fff;
  border: 1px solid var(--gray-light);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: var(--trans);
}
.gallery-card:hover {
  border-color: var(--green-main);
  box-shadow: 0 4px 16px rgba(45,130,80,.15);
  transform: translateY(-3px);
}
.gallery-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  background: var(--gray-light);
  display: block;
}
.gallery-thumb-placeholder {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--green-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--green-main);
  font-size: 13px;
  font-weight: 600;
}
.gallery-info {
  padding: 14px 16px;
}
.gallery-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-dark);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gallery-meta {
  font-size: 12px;
  color: var(--gray-mid);
  display: flex;
  gap: 10px;
}

/* 페이지네이션 */
.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 28px;
}
.page-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  border: 1px solid var(--gray-light);
  background: #fff;
  cursor: pointer;
  font-size: 13px;
  color: var(--gray-dark);
  transition: var(--trans);
}
.page-btn:hover,
.page-btn.active {
  background: var(--green-main);
  color: #fff;
  border-color: var(--green-main);
}

@media (max-width: 900px) {
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
}
</style>

const PAGE_SIZE = 9;
let currentPage = 1;
const totalPages = Math.ceil(REGIONS.length / PAGE_SIZE);

function render(page) {
  currentPage = page;
  const start = (page - 1) * PAGE_SIZE;
  const slice = REGIONS.slice(start, start + PAGE_SIZE);

  document.getElementById('galleryGrid').innerHTML = slice.map(r => {
    const thumbHtml = r.thumb
      ? `<img class="gallery-thumb" src="${r.thumb}" alt="${r.title}">`
      : `<div class="gallery-thumb-placeholder">${r.title.slice(0, 2)}</div>`;
    return `
      <div class="gallery-card" onclick="location.href='about-regions-detail.html?id=${r.id}'">
        ${thumbHtml}
        <div class="gallery-info">
          <div class="gallery-title">${r.title}</div>
          <div class="gallery-meta">
            <span>대표 ${r.rep}</span>
            <span>${r.area}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // 페이지네이션
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  let pHtml = `<button class="page-btn" onclick="if(${page}>1) render(${page}-1)">&lsaquo;</button>`;
  for (let i = 1; i <= totalPages; i++) {
    pHtml += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="render(${i})">${i}</button>`;
  }
  pHtml += `<button class="page-btn" onclick="if(${page}<${totalPages}) render(${page}+1)">&rsaquo;</button>`;
  document.getElementById('pagination').innerHTML = pHtml;
}

render(1);
